const tierPct=sc=>{if(!sc)return 0;const t=tierOf(sc);if(t.max===Infinity)return 1;return Math.min((sc-t.min)/(t.max-t.min+1),1);};

/* ── AUTH SCREEN ── */
function AuthScreen({T,onAuthed}){
  const [mode,setMode]=useState("login"); // login | signup | forgot
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState({text:"",error:false});
  const [showPass,setShowPass]=useState(false);

  const inp={width:"100%",padding:"13px 14px",background:T.inp,border:`1px solid ${T.b1}`,borderRadius:12,color:T.txt,fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"'Inter',sans-serif",letterSpacing:"-.01em"};

  async function handleSubmit(){
    if(!email.trim()||(!pass&&mode!=="forgot")) return setMsg({text:"Please fill in all fields",error:true});
    if(mode==="signup"&&!name.trim()) return setMsg({text:"Please enter your name",error:true});
    if(pass&&pass.length<6&&mode!=="forgot") return setMsg({text:"Password must be at least 6 characters",error:true});
    setLoading(true);setMsg({text:"",error:false});
    try{
      if(mode==="login"){
        const {data,error}=await sb.auth.signInWithPassword({email:email.trim(),password:pass});
        if(error) return setMsg({text:error.message==="Invalid login credentials"?"Incorrect email or password. Try again.":error.message,error:true});
        onAuthed(data.user);
      } else if(mode==="signup"){
        const {data,error}=await sb.auth.signUp({email:email.trim(),password:pass,options:{data:{full_name:name.trim()}}});
        if(error) return setMsg({text:error.message,error:true});
        if(data.user&&!data.user.confirmed_at){
          setMsg({text:"Check your email for a confirmation link, then log in.",error:false});
          setMode("login");
        } else if(data.user){
          onAuthed(data.user);
        }
      } else {
        const {error}=await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.href});
        if(error) return setMsg({text:error.message,error:true});
        setMsg({text:"Password reset link sent to your email.",error:false});
        setMode("login");
      }
    } catch(e){setMsg({text:"Something went wrong. Try again.",error:true});}
    finally{setLoading(false);}
  }

  return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:-140,right:-110,width:400,height:400,borderRadius:"50%",background:`radial-gradient(circle,${AC}10,transparent 68%)`,pointerEvents:"none"}}/>
    <div style={{position:"absolute",bottom:-120,left:-90,width:320,height:320,borderRadius:"50%",background:`radial-gradient(circle,${AC}0b,transparent 68%)`,pointerEvents:"none"}}/>
    <div style={{width:"100%",maxWidth:360,animation:"ci .4s ease",position:"relative"}}>
      <div style={{textAlign:"center",marginBottom:36}}>
        <div style={{fontWeight:800,fontSize:44,letterSpacing:"-2px",lineHeight:1,color:T.txt}}>High<span style={{color:AC,fontWeight:300,letterSpacing:"0.04em"}}>Enough</span></div>
        <div style={{fontSize:11,color:T.mu,marginTop:8,letterSpacing:"0.18em",textTransform:"uppercase",fontWeight:500}}>Rate · Rise · Repeat</div>
      </div>

      <div style={{background:T.card,border:`1px solid ${T.b1}`,borderRadius:20,padding:"26px 22px 22px"}}>
        <div style={{fontWeight:700,fontSize:18,color:T.txt,marginBottom:6}}>
          {mode==="login"?"Welcome back":mode==="signup"?"Create account":"Reset password"}
        </div>
        <div style={{fontSize:13,color:T.mu,marginBottom:22}}>

        {mode!=="forgot"&&<div style={{marginBottom:20}}>

        <div style={{marginTop:18,display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
          {mode==="login"&&<>
            <button onClick={()=>{setMode("forgot");setMsg({text:"",error:false});}} style={{background:"none",border:"none",color:T.mu,fontSize:13,cursor:"pointer"}}>Forgot password?</button>
            <div style={{fontSize:13,color:T.mu}}>Don't have an account? <button onClick={()=>{setMode("signup");setMsg({text:"",error:false});}} style={{background:"none",border:"none",color:AC,fontWeight:600,cursor:"pointer",fontSize:13}}>Sign up</button></div>
          </>}
          {mode==="signup"&&<div style={{fontSize:13,color:T.mu}}>Already have an account? <button onClick={()=>{setMode("login");setMsg({text:"",error:false});}} style={{background:"none",border:"none",color:AC,fontWeight:600,cursor:"pointer",fontSize:13}}>Sign in</button></div>}
          {mode==="forgot"&&<button onClick={()=>{setMode("login");setMsg({text:"",error:false});}} style={{background:"none",border:"none",color:T.mu,fontSize:13,cursor:"pointer"}}>← Back to sign in</button>}
        </div>
      </div>
      <p style={{textAlign:"center",fontSize:11,color:T.mu,marginTop:16,lineHeight:1.6,opacity:.7}}>By signing up you agree to our Terms & Privacy Policy</p>
    </div>
  </div>;
}

/* ── PROFILE SETUP (after first sign up) ── */
function ProfileSetup({user,T,onDone}){
  const [nm,setNm]=useState(user.user_metadata?.full_name||"");
  const [hd,setHd]=useState("");
  const [bio,setBio]=useState("");
  const [col,setCol]=useState(PALETTE[0]);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const inp={width:"100%",padding:"12px 14px",background:T.inp,border:`1px solid ${T.b1}`,borderRadius:12,color:T.txt,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"'Inter',sans-serif"};

  async function create(){
    if(!nm.trim()) return setErr("Please enter your name");
    setLoading(true);setErr("");
    const handle=hd.trim()||`@${nm.trim().split(" ")[0].toLowerCase().replace(/[^a-z0-9]/g,"")}`;
    const profile={
      id:user.id, name:nm.trim(), handle,
      bio:bio.trim(), color:col, age:null,
      photo:null, interests:[], links:{},
      email:user.email, created_at:new Date().toISOString()
    };
    const {error}=await sb.from("profiles").upsert(profile);
    if(error){setErr("Could not save profile. Try again.");setLoading(false);return;}
    onDone(profile);
  }

  return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{width:"100%",maxWidth:380,animation:"ci .4s ease"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontWeight:800,fontSize:38,letterSpacing:"-2px",color:T.txt}}>High<span style={{color:AC,fontWeight:300,letterSpacing:"0.04em"}}>Enough</span></div>
        <div style={{fontSize:13,color:T.mu,marginTop:8}}>Set up your profile</div>
      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
        <Ava p={{name:nm||"?",color:col,photo:null}} size={84} T={T}/>
      </div>
      <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:22}}>
        {PALETTE.map(c=><div key={c} onClick={()=>setCol(c)} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",outline:col===c?`2.5px solid ${T.txt}`:"2.5px solid transparent",outlineOffset:2,transform:col===c?"scale(1.2)":"scale(1)",transition:"transform .11s"}}/>)}
      </div>
      {[{l:"Display Name *",v:nm,s:setNm,p:"Your name"},{l:"Handle",v:hd,s:setHd,p:"@username (optional)"},{l:"Bio",v:bio,s:setBio,p:"A short line about you…"}].map(f=><div key={f.l} style={{marginBottom:13}}>
        <label style={{fontSize:11,color:T.mu,textTransform:"uppercase",letterSpacing:.7,display:"block",marginBottom:4,fontWeight:600}}>{f.l}</label>
        <input value={f.v} onChange={e=>f.s(e.target.value)} placeholder={f.p} style={inp}/>
      </div>)}
      {err&&<div style={{color:"#d06060",fontSize:13,marginBottom:12,padding:"9px 12px",background:"#a0303018",borderRadius:9,border:"1px solid #a0303030"}}>{err}</div>}
      <button disabled={loading} onClick={create} style={{width:"100%",padding:"14px 0",background:loading?T.faint:`linear-gradient(135deg,${col}e0,${col}90)`,border:"none",borderRadius:12,color:loading?T.mu:"#fff",fontWeight:700,fontSize:15,cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        {loading?<><Spinner/>Saving…</>:"Continue →"}
      </button>
    </div>
  </div>;
}

/* ── TIER MAP ── */
function TierMapPanel({T,onClose}){

    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {[...TIERS].reverse().map(t=>{const isFama=t.label==="HighEnough";
        return <div key={t.label} style={{display:"flex",alignItems:"center",gap:12,background:isFama?`${t.color}0e`:T.faint,border:`1px solid ${isFama?t.color+"40":T.b1}`,borderRadius:12,padding:"11px 14px"}}>

/* ── QR MODAL ── */
function QRModal({profile,T,onClose}){
  const url=`${location.origin}${location.pathname}?uid=${profile.id}`;
  const ref=useRef(null);const[cp,setCp]=useState(false);
  useEffect(()=>{loadScript("https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js",()=>{if(ref.current)new window.QRious({element:ref.current,value:url,size:170,background:"transparent",foreground:profile.color,backgroundAlpha:0,level:"M"});});},[]);
  return <Overlay onBg={onClose} T={T}><div style={{textAlign:"center"}}>
    <Ava p={profile} size={62} T={T}/>
    <div style={{fontWeight:700,fontSize:18,color:T.txt,marginTop:12}}>{profile.name}</div>
    <div style={{marginTop:6,marginBottom:18,display:"flex",gap:7,justifyContent:"center",flexWrap:"wrap"}}><Tag label={`#${profile.id.slice(0,8)}`} color={T.mu} T={T}/><TierBadge sc={pScore(profile)} size="sm"/></div>
    <div style={{margin:"0 auto 16px",width:190,height:190,background:T.faint,border:`1px solid ${T.b1}`,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center"}}><canvas ref={ref}/></div>
    <p style={{color:T.mu,fontSize:11,fontFamily:"'JetBrains Mono',monospace",wordBreak:"break-all",lineHeight:1.8,marginBottom:16}}>{url}</p>
    <button onClick={()=>{navigator.clipboard?.writeText(url);setCp(true);setTimeout(()=>setCp(false),2000);}} style={{padding:"11px 28px",background:`linear-gradient(135deg,${profile.color}e0,${profile.color}90)`,border:"none",borderRadius:11,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{cp?"Copied ✓":"Copy Link"}</button>
  </div></Overlay>;
}

/* ── RATE MODAL ── */
function RateModal({target,raterId,raterName,existing,T,onClose,onSubmit}){
  const isEdit=!!existing;
  const [vals,setVals]=useState(isEdit?Object.fromEntries(CATS.map(c=>[c.id,existing[c.id]||0])):Object.fromEntries(CATS.map(c=>[c.id,50])));
  const contribution=Math.round(avg(CATS.map(c=>vals[c.id]||0)));
  const currentSc=pScore(target)||0;
  const projSc=isEdit?currentSc-Math.round(avg(CATS.map(c=>existing[c.id]||0)))+contribution:currentSc+contribution;
  const tBefore=tierOf(currentSc),tAfter=tierOf(projSc);
  const tierUp=TIERS.indexOf(tAfter)>TIERS.indexOf(tBefore);
  return <Overlay onBg={onClose} T={T}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <Ava p={target} size={48} T={T}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,fontSize:16,color:T.txt}}>{isEdit?"Edit Rating —":"Rate"} {target.name}</div>
        <TierBadge sc={pScore(target)} size="sm"/>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:700,color:tierUp?tAfter.color:T.txt,lineHeight:1,transition:"color .3s"}}>{contribution}</div>
        <div style={{fontSize:9,color:T.mu,letterSpacing:.5,marginTop:2}}>pts</div>
      </div>
    </div>
    {tierUp&&<div style={{background:`${tAfter.color}14`,border:`1px solid ${tAfter.color}30`,borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:tAfter.color,fontWeight:600,display:"flex",alignItems:"center",gap:6}}><span>{tAfter.emoji}</span> This rating will push them to {tAfter.label}!</div>}
    {isEdit&&<div style={{background:`${AC}10`,border:`1px solid ${AC}28`,borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:AC,fontWeight:600}}>✏️ Updating your previous rating</div>}
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {CATS.map(c=><div key={c.id}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:13,color:T.txt,fontWeight:500}}>{c.emoji} {c.label}</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.txt,fontWeight:600}}>{vals[c.id]}</span>
        </div>
        <input type="range" min={0} max={100} value={vals[c.id]} onChange={e=>setVals(v=>({...v,[c.id]:+e.target.value}))} style={{width:"100%",cursor:"pointer"}}/>
      </div>)}
    </div>
    <button onClick={()=>onSubmit(target.id,{...vals,raterId,raterName,ts:Date.now()})} style={{marginTop:20,width:"100%",padding:"13px 0",background:`linear-gradient(135deg,${target.color}e0,${target.color}90)`,border:"none",borderRadius:12,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>{isEdit?"Update Rating ✓":"Submit Rating ✓"}</button>
  </Overlay>;
}

/* ── VIEW MODAL ── */

  const sc=pScore(profile),n=(profile.ratings||[]).length,t=tierOf(sc??0);
  const pct=tierPct(sc??0),next=sc!=null?TIERS[TIERS.indexOf(t)+1]:null;
  const myR=profile.ratings?.find(r=>r.raterId===myId);
  const links=profile.links||{};
  return <Overlay onBg={onClose} T={T} wide>

        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.mu,marginTop:2}}>{profile.handle}</div>
        {profile.bio&&<p style={{color:T.mu,fontSize:12,marginTop:5,lineHeight:1.5}}>{profile.bio}</p>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

        {next&&<span style={{fontSize:11,color:T.mu,fontFamily:"'JetBrains Mono',monospace"}}>{next.emoji} {next.label} at {next.min.toLocaleString()}</span>}
      </div>
      <div style={{height:4,background:T.b1,borderRadius:99,overflow:"hidden"}}><div style={{width:`${pct*100}%`,height:"100%",background:t.color,borderRadius:99,opacity:.8,transition:"width .9s"}}/></div>
    </div>
    {(profile.interests||[]).length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>{profile.interests.map(i=><Tag key={i} label={i} color={profile.color} T={T}/>)}</div>}
    {(links.instagram||links.twitter||links.tiktok||links.website)&&<div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
      {links.instagram&&<a href={`https://instagram.com/${links.instagram.replace("@","")}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#c96090",background:"#c9609014",border:"1px solid #c9609028",borderRadius:6,padding:"3px 10px",fontWeight:600}}>📸 {links.instagram}</a>}
      {links.twitter&&<a href={`https://x.com/${links.twitter.replace("@","")}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#6090c8",background:"#6090c814",border:"1px solid #6090c828",borderRadius:6,padding:"3px 10px",fontWeight:600}}>𝕏 {links.twitter}</a>}
      {links.tiktok&&<a href={`https://tiktok.com/@${links.tiktok.replace("@","")}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:T.mu,background:T.faint,border:`1px solid ${T.b1}`,borderRadius:6,padding:"3px 10px",fontWeight:600}}>🎵 {links.tiktok}</a>}
      {links.website&&<a href={links.website} target="_blank" rel="noreferrer" style={{fontSize:11,color:AC,background:`${AC}14`,border:`1px solid ${AC}28`,borderRadius:6,padding:"3px 10px",fontWeight:600}}>🔗 Site</a>}
    </div>}
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
      <Tag label={`${n} rating${n!==1?"s":""}`} color={T.mu} T={T}/>
      {sc!=null&&<Tag label={`${fmtScore(sc)} pts`} color={t.color} T={T}/>}
    </div>
    <div style={{height:1,background:T.b1,marginBottom:13}}/>

      <Bar v={v} color={profile.color} T={T}/>

    {myR&&!isSelf&&<><div style={{height:1,background:T.b1,margin:"12px 0"}}/>
      <div style={{background:T.faint,border:`1px solid ${T.b1}`,borderRadius:10,padding:"10px 13px"}}>
        <div style={{fontSize:10,color:T.mu,marginBottom:6,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Your Rating</div>

      <button onClick={()=>{isBlocked?onUnblock(profile.id):onBlock(profile.id);onClose();}} style={{flex:1,padding:"9px 0",background:"transparent",border:`1px solid ${T.b1}`,borderRadius:10,color:isBlocked?"#38a060":T.mu,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><ShieldIcon size={13}/>{isBlocked?"Unblock":"Block"}</button>
      <button onClick={()=>{onClose();onReport(profile);}} style={{flex:1,padding:"9px 0",background:"transparent",border:"1px solid #7a303030",borderRadius:10,color:"#c07070",fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><FlagIcon size={13}/>Report</button>
    </div>}
  </Overlay>;
}

/* ── REPORT MODAL ── */

  function pick(){const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPrev(ev.target.result);r.readAsDataURL(f);};i.click();}
  async function startCam(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});setStream(s);setCam(true);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},100);}catch{alert("Camera unavailable");}}
  function stopCam(){stream?.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);}
  function snap(){const v=vRef.current,c=cRef.current;if(!v||!c)return;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);setPrev(c.toDataURL("image/jpeg",.85));stopCam();}

/* ── SCORE CARD ── */
function ScoreCardModal({profile,T,onClose}){
  const sc=pScore(profile),n=(profile.ratings||[]).length,t=tierOf(sc??0);
  const canvasRef=useRef(null);const[saved,setSaved]=useState(false);
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");const W=800,H=800;canvas.width=W;canvas.height=H;
    const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,"#0d0c1e");bg.addColorStop(1,"#09090f");
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const glow=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,340);
    glow.addColorStop(0,t.color+"28");glow.addColorStop(1,"transparent");
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
    ctx.fillStyle="#12111e";ctx.beginPath();ctx.roundRect(60,60,W-120,H-120,32);ctx.fill();
    ctx.strokeStyle=t.color+"40";ctx.lineWidth=1.5;ctx.stroke();
    ctx.font="600 28px Inter,Arial";ctx.fillStyle="#ffffff40";ctx.textAlign="left";ctx.fillText("HighEnough",96,118);
    ctx.beginPath();ctx.arc(W/2,240,80,0,Math.PI*2);ctx.fillStyle=profile.color+"30";ctx.fill();ctx.strokeStyle=profile.color+"70";ctx.lineWidth=3;ctx.stroke();
    ctx.font="bold 52px Inter,Arial";ctx.fillStyle=profile.color;ctx.textAlign="center";ctx.fillText(ini(profile.name),W/2,257);
    ctx.font="bold 48px Inter,Arial";ctx.fillStyle="#f0f0ff";ctx.fillText(profile.name,W/2,350);
    ctx.font="500 26px monospace";ctx.fillStyle="#5a5a90";ctx.fillText(profile.handle,W/2,390);
    ctx.font="bold 120px monospace";ctx.fillStyle=t.color;ctx.fillText(sc!=null?fmtScore(sc):"—",W/2,510);
    ctx.font="bold 28px Inter,Arial";ctx.fillStyle=t.color;ctx.fillText(`${t.emoji} ${t.label}`,W/2,568);
    const bW=88,bH=8,bY=640,gap=14,allW=CATS.length*(bW+gap)-gap,startX=(W-allW)/2;
    CATS.forEach((c,i)=>{const v=cAvg(profile,c.id)/100,x=startX+i*(bW+gap);ctx.fillStyle="#1e1e2c";ctx.beginPath();ctx.roundRect(x,bY,bW,bH,4);ctx.fill();if(v>0){ctx.fillStyle=profile.color+"cc";ctx.beginPath();ctx.roundRect(x,bY,bW*v,bH,4);ctx.fill();}ctx.font="500 18px Inter,Arial";ctx.fillStyle="#5a5a90";ctx.fillText(c.emoji,x+bW/2,bY+32);});
    ctx.font="500 22px Inter,Arial";ctx.fillStyle="#3a3a60";ctx.fillText(`${n} rating${n!==1?"s":""}`,W/2,740);
  },[profile]);
  function download(){const canvas=canvasRef.current;if(!canvas)return;const a=document.createElement("a");a.download=`${profile.name.replace(/\s+/g,"_")}_HighEnough.png`;a.href=canvas.toDataURL("image/png");a.click();setSaved(true);setTimeout(()=>setSaved(false),2000);}
  return <Overlay onBg={onClose} T={T} wide>
    <div style={{fontWeight:700,fontSize:17,color:T.txt,marginBottom:4}}>Score Card</div>
    <div style={{fontSize:12,color:T.mu,marginBottom:14}}>Download and share your rank</div>
    <canvas ref={canvasRef} style={{width:"100%",borderRadius:14,border:`1px solid ${T.b1}`,display:"block",marginBottom:14}}/>
    <div style={{display:"flex",gap:8}}>
      <button onClick={download} style={{flex:1,padding:"12px 0",background:`linear-gradient(135deg,${AC}e0,${AC}90)`,border:"none",borderRadius:11,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>{saved?"Saved ✓":"⬇ Download"}</button>
      <button onClick={()=>{const canvas=canvasRef.current;if(!canvas)return;canvas.toBlob(b=>{try{navigator.share({files:[new File([b],"highenough.png",{type:"image/png"})],title:"My HighEnough Score"});}catch{download();}});}} style={{padding:"12px 16px",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:11,color:T.mu,fontWeight:600,fontSize:13,cursor:"pointer"}}>Share</button>
    </div>
  </Overlay>;
}

/* ── SEARCH ── */
function SearchTab({profiles,myId,T,onView,onRate}){
  const [q,setQ]=useState("");const[res,setRes]=useState(null);const[err,setErr]=useState("");const[mode,setMode]=useState("search");
  const [stream,setStream]=useState(null);const vRef=useRef(null);const cRef=useRef(null);const raf=useRef(null);
  useEffect(()=>()=>{cancelAnimationFrame(raf.current);stream?.getTracks().forEach(t=>t.stop());},[]);
  function findP(raw){if(!raw.trim())return;let id=raw.trim();try{id=new URL(raw).searchParams.get("uid")||id;}catch{}id=id.replace(/[^A-Z0-9]/gi,"").toUpperCase().slice(0,36);const f=profiles.find(p=>p.id===id||p.id.startsWith(id.slice(0,6)));f?(setRes(f),setErr("")):(setErr("Profile not found"),setRes(null));}
  async function startCam(){loadScript("https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js",async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});setStream(s);setMode("cam");setTimeout(()=>{if(vRef.current){vRef.current.srcObject=s;vRef.current.play();loop();}},200);}catch{setErr("Camera unavailable");}});}
  function loop(){raf.current=requestAnimationFrame(()=>{const v=vRef.current,c=cRef.current;if(!v||!c||!window.jsQR){loop();return;}if(v.readyState>=2){c.width=v.videoWidth;c.height=v.videoHeight;const ctx=c.getContext("2d");ctx.drawImage(v,0,0);const d=ctx.getImageData(0,0,c.width,c.height);const code=window.jsQR(d.data,d.width,d.height);if(code){stopCam();findP(code.data);return;}}loop();});}
  function stopCam(){cancelAnimationFrame(raf.current);stream?.getTracks().forEach(t=>t.stop());setStream(null);setMode("search");}
  function fromGallery(){loadScript("https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js",()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=img.width;c.height=img.height;c.getContext("2d").drawImage(img,0,0);const d=c.getContext("2d").getImageData(0,0,c.width,c.height);const code=window.jsQR(d.data,d.width,d.height);code?findP(code.data):setErr("No QR found in image");};img.src=ev.target.result;};r.readAsDataURL(f);};i.click();});}
  const filtered=q.length>1?profiles.filter(p=>p.id!==myId&&(p.name.toLowerCase().includes(q.toLowerCase())||p.handle.toLowerCase().includes(q.toLowerCase()))).slice(0,7):[];
  return <div style={{padding:"0 14px"}}>
    <div style={{display:"flex",background:T.faint,borderRadius:10,padding:3,marginBottom:12}}>
      {[["search","🔍 Search"],["cam","📷 Scan"],["gallery","🖼️ Photo"],["paste","🔗 Link"]].map(([m,l])=><button key={m} onClick={()=>{if(m==="cam")startCam();else if(m==="gallery")fromGallery();else{stopCam();setMode(m);}}} style={{flex:1,padding:"8px 0",borderRadius:8,border:mode===m?`1px solid ${T.b1}`:"1px solid transparent",cursor:"pointer",background:mode===m?T.card:"transparent",color:mode===m?T.txt:T.mu,fontWeight:mode===m?600:400,fontSize:11,transition:"all .12s"}}>{l}</button>)}
    </div>
    {(mode==="search"||mode==="paste")&&<div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&findP(q)} placeholder={mode==="paste"?"Paste profile link…":"Search by name or handle…"} style={{flex:1,padding:"11px 13px",background:T.inp,border:`1px solid ${T.b1}`,borderRadius:11,color:T.txt,fontSize:13,outline:"none"}}/>
        <button onClick={()=>findP(q)} style={{padding:"11px 14px",background:`${AC}18`,border:`1px solid ${AC}30`,borderRadius:11,color:AC,fontWeight:600,cursor:"pointer",fontSize:15}}>→</button>
      </div>
      {filtered.map(p=><div key={p.id} onClick={()=>setRes(p)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px",background:T.card,borderRadius:12,marginBottom:7,cursor:"pointer",border:`1px solid ${T.b1}`,transition:"border-color .14s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.b2} onMouseLeave={e=>e.currentTarget.style.borderColor=T.b1}>
        <Ava p={p} size={40} T={T}/><div style={{flex:1}}><div style={{fontWeight:600,color:T.txt,fontSize:13}}>{p.name}</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.mu}}>{p.handle}</div></div><ChevronIcon size={13}/>
      </div>)}
    </div>}
    {mode==="cam"&&<div style={{marginBottom:14}}>

        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:"62%",height:"62%",border:`2px solid ${AC}cc`,borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.45)"}}/></div>

    </div>}

    {res&&<div style={{background:T.card,border:`1px solid ${res.color}30`,borderRadius:14,padding:"14px 14px",animation:"su .2s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:12}}><Ava p={res} size={50} T={T}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:T.txt}}>{res.name}</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.mu}}>{res.handle}</div>{res.bio&&<p style={{fontSize:12,color:T.mu,marginTop:3}}>{res.bio}</p>}</div><ScorePill sc={pScore(res)}/></div>
      <div style={{display:"flex",gap:7}}>
        <button onClick={()=>onView(res)} style={{flex:1,padding:"9px 0",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:9,color:T.txt,fontWeight:600,cursor:"pointer",fontSize:13}}>View Profile</button>
        {res.id!==myId&&<button onClick={()=>onRate(res,res.ratings?.find(r=>r.raterId===myId))} style={{flex:1,padding:"9px 0",background:`${res.color}14`,border:`1px solid ${res.color}30`,borderRadius:9,color:res.color,fontWeight:600,cursor:"pointer",fontSize:13}}>Rate</button>}
      </div>
    </div>}
  </div>;
}

        <button onClick={onTierMap} style={{padding:"9px 14px",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:9,color:T.mu,fontSize:12,fontWeight:500,cursor:"pointer"}}>Tiers</button>

        <div style={{display:"flex",gap:8,alignItems:"center"}}>

        {notifs.map((n,i)=>{const actor=profiles.find(p=>p.id===n.actorId);const icons={rating:"⭐",edit:"✏️",tier:"🏆"};

            <div style={{position:"relative",flexShrink:0}}><Ava p={actor||{name:"?",color:AC}} size={40} T={T}/><div style={{position:"absolute",bottom:-2,right:-2,width:17,height:17,borderRadius:"50%",background:T.surf,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,border:`1px solid ${T.b1}`}}>{icons[n.type]||"📢"}</div></div>
            <div style={{flex:1}}><div style={{fontSize:13,color:T.txt,lineHeight:1.4}}><strong>{actor?.name||"Someone"}</strong> {n.text}</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.mu,marginTop:2}}>{ago(n.ts)}</div></div>
            {!n.read&&<div style={{width:7,height:7,borderRadius:"50%",background:AC,flexShrink:0,marginTop:5}}/>}

/* ══════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════ */
const DP={dark:true,compact:false,anon:false};

function App(){
  // ── Auth state ──
  const [authUser,setAuthUser]=useState(null);  // Supabase auth user
  const [profile,setProfile]=useState(null);     // profile row from DB
  const [authLoading,setAuthLoading]=useState(true);

  // ── App state ──
  const [profiles,setProfiles]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [blocked,setBlocked]=useState([]);
  const [reports,setReports]=useState([]);
  const [prefs,setPrefs]=useState(DP);

  // ── UI state ──
  const [tab,setTab]=useState("feed");
  const [rateT,setRateT]=useState(null);
  const [viewT,setViewT]=useState(null);
  const [qrT,setQRT]=useState(null);
  const [settings,setSettings]=useState(false);
  const [photo,setPhoto]=useState(false);
  const [scoreCard,setScoreCard]=useState(null);
  const [reportT,setReportT]=useState(null);
  const [showBlocked,setShowBlocked]=useState(false);
  const [showNotifs,setShowNotifs]=useState(false);
  const [tierMap,setTierMap]=useState(false);
  const [showAdminLock,setShowAdminLock]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [adminTaps,setAdminTaps]=useState(0);
  const [toast,setToast]=useState(null);
  const adminTapTimer=useRef(null);

  const T=prefs.dark?DK:LT;

  const pop=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  // ── Load prefs from localStorage ──
  useEffect(()=>{
    const saved=getLoc();
    if(saved.prefs) setPrefs(p=>({...p,...saved.prefs}));
  },[]);

  // ── Auth listener — this is the KEY fix ──
  // Supabase auth remembers the user automatically via cookies/localStorage
  // User never has to log in again unless they explicitly log out
  useEffect(()=>{
    // Check existing session
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        setAuthUser(session.user);
        loadUserProfile(session.user.id);
      } else {
        setAuthLoading(false);
      }
    });
    // Listen for auth changes
    const {data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==="SIGNED_IN"&&session?.user){
        setAuthUser(session.user);
        loadUserProfile(session.user.id);
      } else if(event==="SIGNED_OUT"){
        setAuthUser(null);setProfile(null);setProfiles([]);setNotifs([]);setBlocked([]);
        setAuthLoading(false);
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadUserProfile(userId){
    setAuthLoading(true);
    const {data,error}=await sb.from("profiles").select("*").eq("id",userId).single();
    if(data){
      setProfile(data);
      loadAppData(data);
    } else {
      // New user — needs to set up profile
      setProfile(null);
    }
    setAuthLoading(false);
  }

  async function loadAppData(myProfile){
    // Load all profiles + ratings
    const [profilesRes,ratingsRes,blocksRes,notifsRes]=await Promise.all([
      sb.from("profiles").select("*"),
      sb.from("ratings").select("*"),
      sb.from("blocks").select("blocked_id").eq("blocker_id",myProfile.id),
      sb.from("notifications").select("*").eq("target_id",myProfile.id).order("created_at",{ascending:false}).limit(60),
    ]);
    if(profilesRes.data){
      const allRatings=ratingsRes.data||[];
      const merged=profilesRes.data.map(p=>({
        ...p,
        ratings:allRatings.filter(r=>r.target_id===p.id).map(r=>({
          raterId:r.rater_id,raterName:r.rater_name||"",
          vibe:r.vibe,humor:r.humor,kindness:r.kindness,
          rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,
          ts:new Date(r.updated_at).getTime()
        }))
      }));
      setProfiles(merged);
    }
    if(blocksRes.data) setBlocked(blocksRes.data.map(r=>r.blocked_id));
    if(notifsRes.data) setNotifs(notifsRes.data.map(n=>({type:n.type,actorId:n.actor_id,text:n.text,ts:new Date(n.created_at).getTime(),read:n.read})));

    // Subscribe to new notifications realtime
    sb.channel(`notifs_${myProfile.id}`)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"notifications",filter:`target_id=eq.${myProfile.id}`},
        payload=>{
          const n=payload.new;
          setNotifs(prev=>[{type:n.type,actorId:n.actor_id,text:n.text,ts:new Date(n.created_at).getTime(),read:false},...prev].slice(0,60));
        })
      .subscribe();
  }

  // ── Poll for new profiles/ratings every 30s ──
  useEffect(()=>{
    if(!profile) return;
    const interval=setInterval(async()=>{
      const [pr,rr]=await Promise.all([sb.from("profiles").select("*"),sb.from("ratings").select("*")]);
      if(pr.data&&rr.data){
        const allR=rr.data;
        setProfiles(pr.data.map(p=>({...p,ratings:allR.filter(r=>r.target_id===p.id).map(r=>({raterId:r.rater_id,raterName:r.rater_name||"",vibe:r.vibe,humor:r.humor,kindness:r.kindness,rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,ts:new Date(r.updated_at).getTime()}))})));
      }
    },30000);
    return()=>clearInterval(interval);
  },[profile?.id]);

  function handleAdminTap(){
    const next=adminTaps+1;setAdminTaps(next);
    clearTimeout(adminTapTimer.current);
    if(next>=5){setShowAdminLock(true);setAdminTaps(0);}
    else{adminTapTimer.current=setTimeout(()=>setAdminTaps(0),2500);}
  }

  async function handleAuthed(user){
    setAuthUser(user);
    await loadUserProfile(user.id);
  }

  async function handleProfileCreated(p){
    setProfile(p);
    await loadAppData(p);
    pop("Welcome to HighEnough ✦");
  }

  async function handleLogout(){
    await sb.auth.signOut();
    setAuthUser(null);setProfile(null);setProfiles([]);setNotifs([]);setBlocked([]);
    setTab("feed");
  }

  async function handleDeleteAccount(){
    if(!profile) return;
    await sb.from("profiles").delete().eq("id",profile.id);
    await sb.auth.signOut();
    setAuthUser(null);setProfile(null);setProfiles([]);
    pop("Account deleted");
  }

  async function handleSaveProfile(u){
    const updated={...profile,...u};
    const {error}=await sb.from("profiles").upsert({...updated,created_at:updated.created_at||new Date().toISOString()});
    if(!error){setProfile(updated);setProfiles(prev=>prev.map(p=>p.id===updated.id?updated:p));pop("Profile saved");}
    else pop("Could not save. Try again.");
  }

  async function handleSavePhoto(photoData){
    await handleSaveProfile({photo:photoData});
    setPhoto(false);pop("Photo updated");
  }

  function handleSavePrefs(p){
    setPrefs(p);
    setLoc({...getLoc(),prefs:p});
  }

  function handleRate(p,ex){
    if(blocked.includes(p.id)) return pop("You've blocked this user");
    setRateT({profile:p,existing:ex});
  }

  async function handleSubmit(tid,sc2){
    const isEdit=!!rateT?.existing;
    // Save rating to Supabase
    await sb.from("ratings").upsert({
      rater_id:sc2.raterId,target_id:tid,rater_name:sc2.raterName||"",
      vibe:sc2.vibe,humor:sc2.humor,kindness:sc2.kindness,
      rizz:sc2.rizz,loyalty:sc2.loyalty,drip:sc2.drip,
      updated_at:new Date().toISOString()
    },{onConflict:"rater_id,target_id"});
    // Update local state
    setProfiles(prev=>prev.map(p=>{
      if(p.id!==tid) return p;
      const ex=p.ratings?.find(r=>r.raterId===sc2.raterId);
      const newR={raterId:sc2.raterId,raterName:sc2.raterName,vibe:sc2.vibe,humor:sc2.humor,kindness:sc2.kindness,rizz:sc2.rizz,loyalty:sc2.loyalty,drip:sc2.drip,ts:sc2.ts};
      return{...p,ratings:ex?p.ratings.map(r=>r.raterId===sc2.raterId?newR:r):[...(p.ratings||[]),newR]};
    }));
    // Send notification
    await sb.from("notifications").insert({target_id:tid,actor_id:profile.id,actor_name:prefs.anon?"Anonymous":profile.name,type:isEdit?"edit":"rating",text:isEdit?"updated their rating of you":"rated you",read:false,created_at:new Date().toISOString()});
    setRateT(null);
    pop(isEdit?"Rating updated ✓":"Rating submitted ✓");
  }

  async function handleBlock(uid){
    setBlocked(prev=>[...prev.filter(x=>x!==uid),uid]);
    await sb.from("blocks").upsert({blocker_id:profile.id,blocked_id:uid});
    pop("User blocked");
  }
  async function handleUnblock(uid){
    setBlocked(prev=>prev.filter(x=>x!==uid));
    await sb.from("blocks").delete().eq("blocker_id",profile.id).eq("blocked_id",uid);
    pop("User unblocked");
  }
  async function handleReport(targetId,reasonId,alsoBlock){
    const r={targetId,reasonId,ts:Date.now(),reporterId:profile.id};
    setReports(prev=>[r,...prev]);
    await sb.from("reports").insert({reporter_id:profile.id,target_id:targetId,reason:reasonId,created_at:new Date().toISOString()});
    if(alsoBlock) handleBlock(targetId);
  }

  function handleMarkNotif(idx){
    if(idx==="all") setNotifs(prev=>prev.map(n=>({...n,read:true})));
    else setNotifs(prev=>prev.map((n,i)=>i===idx?{...n,read:true}:n));
  }

  async function handleAdminDeleteProfile(id){
    await sb.from("profiles").delete().eq("id",id);
    setProfiles(prev=>prev.filter(p=>p.id!==id));
    pop("Profile deleted");
  }
  async function handleAdminClearRatings(id){
    await sb.from("ratings").delete().eq("target_id",id);
    setProfiles(prev=>prev.map(p=>p.id===id?{...p,ratings:[]}:p));
    pop("Ratings cleared");
  }
  function handleExport(type){
    const data=type==="all"?{profiles,reports}:type==="profiles"?{profiles}:{reports};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`highenough_${type}_${Date.now()}.json`;a.click();
    pop("Exported ✓");
  }

  useEffect(()=>{document.body.style.background=T.bg;document.body.style.color=T.txt;},[T.bg,T.txt]);

  // ── Loading screen ──
  if(authLoading) return <div style={{minHeight:"100vh",background:DK.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
    <div style={{fontWeight:800,fontSize:36,letterSpacing:"-2px",color:DK.txt}}>High<span style={{color:AC,fontWeight:300,letterSpacing:"0.04em"}}>Enough</span></div>
    <Spinner/>
  </div>;

  // ── Not signed in ──
  if(!authUser) return <AuthScreen T={DK} onAuthed={handleAuthed}/>;

  // ── Signed in but no profile yet ──
  if(!profile) return <ProfileSetup user={authUser} T={T} onDone={handleProfileCreated}/>;

  // ── Main app ──
  const myP=profiles.find(p=>p.id===profile.id)||{...profile,ratings:[]};
  const feedProfiles=profiles.filter(p=>p.id!==profile.id&&!blocked.includes(p.id));
  const unreadN=notifs.filter(n=>!n.read).length;
  const NAV=[
    {id:"feed",   icon:"feed",    label:"Feed"},
    {id:"search", icon:"search",  label:"Search"},
    {id:"board",  icon:"board",   label:"Board"},
    {id:"ratings",icon:"ratings", label:"Ratings"},
    {id:"profile",icon:"profile", label:"Profile"},
  ];
  const TITLES={search:"Find People",board:"Leaderboard",ratings:"Ratings"};

  return <>
    <div style={{minHeight:"100vh",background:T.bg,color:T.txt,paddingBottom:78}}>
      {/* TOP BAR */}
      <div style={{background:T.nav,borderBottom:`1px solid ${T.b1}`,padding:"13px 16px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontWeight:800,fontSize:22,letterSpacing:"-1.5px",lineHeight:1,color:T.txt,cursor:"pointer",userSelect:"none"}} onClick={handleAdminTap}>
          High<span style={{color:AC,fontWeight:300,letterSpacing:"0.05em"}}>Enough</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setShowNotifs(true)}>
            <div style={{width:36,height:36,borderRadius:10,background:T.faint,border:`1px solid ${T.b1}`,display:"flex",alignItems:"center",justifyContent:"center",color:T.mu}}><BellIcon/></div>
            {unreadN>0&&<div style={{position:"absolute",top:-3,right:-3,minWidth:15,height:15,borderRadius:99,background:"#d84040",border:`1.5px solid ${T.nav}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700,padding:"0 3px"}}>{unreadN>9?"9+":unreadN}</div>}
          </div>
          <Ava p={myP} size={36} T={T} onClick={()=>setSettings(true)}/>
        </div>
      </div>

      {tab!=="feed"&&tab!=="profile"&&<div style={{padding:"14px 16px 0"}}><div style={{fontWeight:700,fontSize:20,color:T.txt,animation:"ci .22s ease"}}>{TITLES[tab]||""}</div></div>}

      <div style={{paddingTop:tab!=="feed"&&tab!=="profile"?12:0}}>
        {tab==="feed"&&<div style={{padding:"14px 14px 0"}}>
          {feedProfiles.length===0
            ?<div style={{textAlign:"center",padding:"55px 0",color:T.mu}}><div style={{fontSize:36,marginBottom:11,opacity:.3}}>◎</div><div style={{fontWeight:500}}>Nobody here yet</div><div style={{fontSize:12,marginTop:5,opacity:.7}}>Share your QR link so others can find you</div></div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:10}}>
              {feedProfiles.map((p,i)=><FeedCard key={p.id} p={p} myId={profile.id} compact={prefs.compact} T={T} onRate={handleRate} onView={setViewT} onBlock={handleBlock} onUnblock={handleUnblock} onReport={setReportT} isBlocked={blocked.includes(p.id)} idx={i}/>)}
            </div>}
        </div>}
        {tab==="search"  &&<SearchTab profiles={profiles} myId={profile.id} T={T} onView={setViewT} onRate={handleRate}/>}
        {tab==="board"   &&<LeaderboardTab profiles={profiles} myId={profile.id} T={T} onView={setViewT} onTierMap={()=>setTierMap(true)}/>}
        {tab==="ratings" &&<RatingsDash profiles={profiles} myId={profile.id} T={T} onView={setViewT} onRate={handleRate}/>}
        {tab==="profile" &&<ProfileTab me={profile} myP={myP} prefs={prefs} T={T} onQR={()=>setQRT(myP)} onSettings={()=>setSettings(true)} onEditPhoto={()=>setPhoto(true)} onScoreCard={()=>setScoreCard(myP)} onTierMap={()=>setTierMap(true)}/>}
      </div>
    </div>

    {/* BOTTOM NAV */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.nav,borderTop:`1px solid ${T.b1}`,display:"flex",padding:"9px 0 16px",zIndex:100}}>
      {NAV.map(({id,icon,label})=>
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:tab===id?AC:T.mu,transition:"color .15s"}}>
          <div style={{padding:"4px 8px",borderRadius:10,background:tab===id?`${AC}14`:"transparent",transition:"background .15s"}}>
            <NavIcon name={icon} active={tab===id} size={21}/>
          </div>
          <span style={{fontSize:8,textTransform:"uppercase",letterSpacing:".08em",fontWeight:tab===id?600:400}}>{label}</span>
        </button>)}
    </div>

    {rateT      &&<RateModal target={rateT.profile} raterId={profile.id} raterName={prefs.anon?"Anonymous":profile.name} existing={rateT.existing} T={T} onClose={()=>setRateT(null)} onSubmit={handleSubmit}/>}
    {viewT      &&<ViewModal profile={viewT} isSelf={viewT.id===profile.id} myId={profile.id} T={T} onClose={()=>setViewT(null)} onRate={handleRate} onQR={setQRT} onBlock={handleBlock} onUnblock={handleUnblock} onReport={setReportT} isBlocked={blocked.includes(viewT.id)} onTierMap={()=>setTierMap(true)}/>}
    {qrT        &&<QRModal profile={qrT} T={T} onClose={()=>setQRT(null)}/>}
    {settings   &&<SettingsModal me={profile} prefs={prefs} T={T} onClose={()=>setSettings(false)} onSaveProfile={handleSaveProfile} onSavePrefs={handleSavePrefs} onEditPhoto={()=>{setSettings(false);setPhoto(true);}} onShowBlocked={()=>{setSettings(false);setShowBlocked(true);}} onLogout={handleLogout} onDelete={handleDeleteAccount}/>}
    {photo      &&<PhotoModal profile={profile} T={T} onClose={()=>setPhoto(false)} onSave={handleSavePhoto}/>}
    {scoreCard  &&<ScoreCardModal profile={scoreCard} T={T} onClose={()=>setScoreCard(null)}/>}
    {reportT    &&<ReportModal target={reportT} T={T} onClose={()=>setReportT(null)} onSubmit={handleReport}/>}
    {showBlocked&&<BlockedListPanel blocked={blocked} profiles={profiles} T={T} onClose={()=>setShowBlocked(false)} onUnblock={handleUnblock}/>}
    {showNotifs &&<NotifsPanel notifs={notifs} profiles={profiles} T={T} onClose={()=>setShowNotifs(false)} onMark={handleMarkNotif} onView={p=>{setViewT(p);setShowNotifs(false);}}/>}
    {tierMap    &&<TierMapPanel T={T} onClose={()=>setTierMap(false)}/>}
    {showAdminLock&&<AdminLock T={T} onClose={()=>setShowAdminLock(false)} onUnlock={()=>{setShowAdminLock(false);setShowAdmin(true);}}/>}
    {showAdmin  &&<AdminPanel profiles={profiles} reports={reports} blocked={blocked} T={T} onClose={()=>setShowAdmin(false)} onDeleteProfile={handleAdminDeleteProfile} onClearRatings={handleAdminClearRatings} onExport={handleExport}/>}
    <Toast msg={toast} T={T}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
