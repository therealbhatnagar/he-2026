  // ── Profiles ──
  async getProfiles(){
    if(!sb) return null;
    const {data,error}=await sb.from("profiles").select("*");
    if(error){console.error("getProfiles:",error);return null;}
    return data;
  },
  async upsertProfile(profile){
    if(!sb) return;
    const {error}=await sb.from("profiles").upsert({
      id:profile.id, name:profile.name, handle:profile.handle,
      bio:profile.bio||"", color:profile.color, age:profile.age||null,
      photo:profile.photo||null, interests:profile.interests||[],
      links:profile.links||{}, created_at:new Date(profile.createdAt).toISOString()
    });

  },
  async deleteProfile(id){
    if(!sb) return;
    await sb.from("profiles").delete().eq("id",id);
  },
  // ── Ratings ──

    if(!sb) return null;
    const {data,error}=await sb.from("ratings").select("*").eq("target_id",profileId);

    return data;

  async upsertRating(r){
    if(!sb) return;
    const {error}=await sb.from("ratings").upsert({

  // ── Messages ──
  async getMessages(convId){
    if(!sb) return null;
    const [a,b]=convId.split("_");
    const {data,error}=await sb.from("messages").select("*")
      .or(`and(sender_id.eq.${a},receiver_id.eq.${b}),and(sender_id.eq.${b},receiver_id.eq.${a})`)
      .order("created_at",{ascending:true});
    if(error){console.error("getMessages:",error);return null;}
    return data;
  },
  async sendMessage(msg){
    if(!sb) return;
    const [a,b]=msg.convId.split("_");
    const receiver=msg.sid===a?b:a;
    const {error}=await sb.from("messages").insert({
      sender_id:msg.sid, receiver_id:receiver, text:msg.txt,
      created_at:new Date(msg.ts).toISOString()

const CATS=[
  {id:"vibe",    label:"Vibe",     emoji:"✨"},
  {id:"humor",   label:"Humor",    emoji:"😂"},
  {id:"kindness",label:"Kindness", emoji:"💛"},

  {id:"loyalty", label:"Loyalty",  emoji:"🤝"},
  {id:"drip",    label:"Drip",     emoji:"💧"}
];
const PALETTE=["#7b72e9","#10a37f","#e0466e","#4f80e2","#c08a2e","#2cba9a","#9b6ee8","#d95c4a"];
const INTERESTS=["Gaming 🎮","Music 🎵","Sports ⚽","Art 🎨","Food 🍜","Travel ✈️","Fitness 💪","Tech 💻","Fashion 👗","Books 📚","Movies 🎬","Anime 🌸","Photography 📷","Cooking 🍳","Dance 💃","Comedy 😄"];
const REPORT_REASONS=[
  {id:"spam",      label:"Spam",               desc:"Fake ratings, repeated content"},
  {id:"harass",    label:"Harassment",          desc:"Threatening or abusive behaviour"},
  {id:"fake",      label:"Fake Profile",        desc:"Impersonating someone else"},
  {id:"inapp",     label:"Inappropriate",       desc:"Offensive content or photos"},
  {id:"underage",  label:"Underage User",       desc:"Appears to be under 13"},
  {id:"other",     label:"Other",               desc:"Something else entirely"},
];
const AC="#7b72e9";

/* ── SCORING ─────────────────────────────────────────────────────
   Score = cumulative sum of each rater's average across 6 cats.
   Each rater contributes 0–100 (their mean). Unlimited growth.
   10 raters × 80 avg = 800 pts. 50 raters × 80 = 4,000 pts.
────────────────────────────────────────────────────────────────*/
const avg=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
const pScore=p=>{
  const r=p.ratings||[];
  if(!r.length)return null;
  return Math.round(r.reduce((s,r2)=>s+avg(CATS.map(c=>r2[c.id]||0)),0));
};
const cAvg=(p,c)=>{const r=p.ratings||[];return r.length?Math.round(avg(r.map(r2=>r2[c]||0))):0;};
const fmtScore=s=>{
  if(s==null)return"—";
  if(s>=10000)return`${(s/1000).toFixed(1)}K`;
  if(s>=1000)return`${(s/1000).toFixed(2)}K`;
  return String(s);
};

/* ── 7-TIER SYSTEM ───────────────────────────────────────────────
   Muted, refined palette. Each tier ~1.5–2× the previous.
   Max per rater = 100. These thresholds scale naturally.
────────────────────────────────────────────────────────────────*/
const TIERS=[
  {label:"Ghost",   emoji:"👤", min:0,    max:0,     color:"#4c5266", grad:["#3e4257","#4c5266"], glow:"#4c526618"},
  {label:"Spark",   emoji:"⚡", min:1,    max:79,    color:"#7a8098", grad:["#636780","#7a8098"], glow:"#7a809820"},
  {label:"Ember",   emoji:"🔥", min:80,   max:249,   color:"#a07840", grad:["#8a6230","#c49050"], glow:"#a0784028"},
  {label:"Blaze",   emoji:"💥", min:250,  max:599,   color:"#b84e48", grad:["#9a3840","#cc6860"], glow:"#b84e4828"},
  {label:"Nova",    emoji:"🌌", min:600,  max:1299,  color:"#7c56c0", grad:["#6340a8","#9470d8"], glow:"#7c56c030"},
  {label:"Stellar", emoji:"🌠", min:1300, max:2799,  color:"#3878b0", grad:["#2860a0","#4a90c8"], glow:"#3878b030"},
  {label:"Fama",    emoji:"👑", min:2800, max:Infinity,color:"#c09038",grad:["#a87828","#d8ac50"],glow:"#c0903840"},
];
const tierOf=sc=>{if(sc==null||sc===0)return TIERS[0];for(let i=TIERS.length-1;i>=0;i--){if(sc>=TIERS[i].min)return TIERS[i];}return TIERS[0];};
const tierPct=sc=>{if(!sc)return 0;const t=tierOf(sc);if(t.max===Infinity)return 1;return Math.min((sc-t.min)/(t.max-t.min+1),1);};
const nextTier=sc=>{const t=tierOf(sc);const i=TIERS.indexOf(t);return i<TIERS.length-1?TIERS[i+1]:null;};

const uid=()=>Math.random().toString(36).slice(2,8).toUpperCase();

/* ── SVG ICONS ── */

  if(name==="search")  return <svg {...p}><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>;
  if(name==="board")   return <svg {...p}><rect x="2" y="14" width="5" height="7" rx="1"/><rect x="9.5" y="9" width="5" height="12" rx="1"/><rect x="17" y="4" width="5" height="17" rx="1"/></svg>;

  if(name==="inbox")   return <svg {...p}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>;
  return null;
}

/* ── ATOMS ── */
function TierBadge({sc,size="md"}){
  const t=tierOf(sc??0),isFama=t.label==="Fama";
  const sz={sm:{px:"3px 9px",fs:10,ef:11},md:{px:"4px 12px",fs:12,ef:13},lg:{px:"7px 16px",fs:13,ef:16}}[size];
  const shimmer=isFama?{background:`linear-gradient(90deg,${t.grad[0]},${t.grad[1]},${t.grad[0]})`,backgroundSize:"200% auto",animation:"sh 2.6s linear infinite",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}:{color:t.color};
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:isFama?`linear-gradient(135deg,${t.grad[0]}28,${t.grad[1]}18)`:`${t.color}14`,border:`1px solid ${t.color}${isFama?"50":"28"}`,borderRadius:6,padding:sz.px,whiteSpace:"nowrap",boxShadow:isFama?`0 0 12px ${t.glow}`:"none"}}>
    <span style={{fontSize:sz.ef,lineHeight:1,animation:isFama?"fl 3s ease infinite":"none"}}>{t.emoji}</span>
    <span style={{fontSize:sz.fs,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,...shimmer}}>{t.label}</span>
  </span>;
}

function ScorePill({sc}){
  if(sc==null)return null;
  const t=tierOf(sc);
  return <div style={{textAlign:"center",background:t.color+"12",border:`1px solid ${t.color}28`,borderRadius:10,padding:"5px 11px",minWidth:60}}>
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:t.color,lineHeight:1}}>{fmtScore(sc)}</div>
    <div style={{fontSize:9,color:t.color,opacity:.8,marginTop:2,fontWeight:600,letterSpacing:.5}}>{t.emoji} pts</div>
  </div>;
}

function Ring({sc,color,size=76}){
  const t=tierOf(sc??0),pct=tierPct(sc??0),r=(size-8)/2,circ=2*Math.PI*r;
  const isFama=t.label==="Fama";
  return <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
    <svg width={size} height={size} style={{position:"absolute",top:0,left:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`${t.color}20`} strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={t.color} strokeWidth={6} strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{filter:`drop-shadow(0 0 ${isFama?8:4}px ${t.color}88)`,transition:"stroke-dasharray .9s"}}/>
    </svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontSize:size*.16,lineHeight:1}}>{t.emoji}</span>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:size*.19,fontWeight:700,color:t.color,lineHeight:1.15}}>{fmtScore(sc)}</span>
      <span style={{fontSize:size*.09,fontWeight:600,color:t.color,opacity:.75,letterSpacing:.3}}>{t.label}</span>
    </div>
  </div>;
}

function Bar({v,color,T}){return <div style={{height:4,background:T.faint,borderRadius:99,overflow:"hidden"}}><div style={{width:`${Math.min(v,100)}%`,height:"100%",background:color,borderRadius:99,transition:"width .7s",opacity:.85}}/></div>;}

function Ava({p,size=46,T,badge,onClick}){
  const c=p?.color||AC;
  const sc=pScore(p||{});const t=tierOf(sc??0);const isFama=t.label==="Fama";
  return <div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",flexShrink:0,background:`${c}18`,border:`1.5px solid ${c}40`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:size*.3,color:c,fontFamily:"'JetBrains Mono',monospace",overflow:"hidden",cursor:onClick?"pointer":"default",position:"relative",boxShadow:isFama?`0 0 0 2.5px ${t.color}40,0 0 12px ${t.glow}`:`0 0 0 2.5px ${c}14`}}>
    {p?.photo?<img src={p.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:ini(p?.name)}
    {badge>0&&<div style={{position:"absolute",top:-2,right:-2,minWidth:15,height:15,borderRadius:99,background:"#d84040",border:`1.5px solid ${T?.nav||"#09090f"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700,padding:"0 3px"}}>{badge>9?"9+":badge}</div>}
  </div>;
}

function Tag({label,color,T}){return <span style={{background:`${color}14`,border:`1px solid ${color}28`,borderRadius:5,padding:"2px 9px",fontSize:11,color,fontWeight:600,whiteSpace:"nowrap",letterSpacing:-.01}}>{label}</span>;}
function Pill({on,onChange,color}){return <div onClick={()=>onChange(!on)} style={{width:44,height:24,borderRadius:99,background:on?color:"#222236",position:"relative",cursor:"pointer",transition:"background .2s",flexShrink:0}}><div style={{position:"absolute",top:3,left:on?20:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.35)"}}/></div>;}

function Overlay({onBg,children,T,wide}){
  return <div onClick={e=>e.target===e.currentTarget&&onBg()} style={{position:"fixed",inset:0,zIndex:200,background:T.ov,backdropFilter:"blur(16px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:T.card,border:`1px solid ${T.b1}`,borderRadius:22,padding:"24px 20px 20px",width:"100%",maxWidth:wide?510:430,position:"relative",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 40px 100px rgba(0,0,0,.7)",animation:"su .2s ease"}}>
      <button onClick={onBg} style={{position:"absolute",top:14,right:14,background:T.faint,border:`1px solid ${T.b1}`,color:T.mu,cursor:"pointer",width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}><XIcon/></button>
      {children}
    </div>
  </div>;
}

function SRow({icon,label,desc,val,onChange,T}){
  return <div style={{display:"flex",alignItems:"center",gap:12,padding:"3px 0"}}>
    <span style={{fontSize:18,width:26,textAlign:"center",opacity:.8}}>{icon}</span>
    <div style={{flex:1}}><div style={{fontSize:14,color:T.txt,fontWeight:500}}>{label}</div>{desc&&<div style={{fontSize:12,color:T.mu,marginTop:1}}>{desc}</div>}</div>
    <Pill on={val} onChange={onChange} color={AC}/>
  </div>;
}

function loadScript(src,cb){
  if(src.includes("jsQR")&&window.jsQR)return cb();
  if(src.includes("qrious")&&window.QRious)return cb();
  const ex=document.querySelector(`script[src="${src}"]`);
  if(ex){ex.addEventListener("load",cb,{once:true});return;}
  const s=document.createElement("script");s.src=src;s.onload=cb;document.head.appendChild(s);
}

/* ── RATE MODAL ── */
function RateModal({target,raterId,raterName,existing,T,onClose,onSubmit}){
  const isEdit=!!existing;
  const [vals,setVals]=useState(isEdit?Object.fromEntries(CATS.map(c=>[c.id,existing[c.id]||0])):Object.fromEntries(CATS.map(c=>[c.id,50])));
  const contribution=Math.round(avg(CATS.map(c=>vals[c.id]||0)));
  const currentSc=pScore(target)||0;
  const projSc=isEdit?currentSc-Math.round(avg(CATS.map(c=>existing[c.id]||0)))+contribution:currentSc+contribution;
  const tBefore=tierOf(currentSc),tAfter=tierOf(projSc);
  const tierUp=TIERS.indexOf(tAfter)>TIERS.indexOf(tBefore);
  return <Overlay onBg={onClose} T={T}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
      <Ava p={target} size={48} T={T}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:16,color:T.txt}}>{isEdit?"Edit rating for":"Rate"} {target.name}</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.mu,marginTop:2}}>#{target.id}</div>
      </div>
      <div style={{textAlign:"center",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:10,padding:"7px 12px"}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:20,fontWeight:700,color:tAfter.color,lineHeight:1}}>+{contribution}</div>
        <div style={{fontSize:9,color:T.mu,marginTop:2,textTransform:"uppercase",letterSpacing:.5}}>pts</div>
      </div>
    </div>
    {isEdit&&<div style={{background:T.faint,border:`1px solid ${T.b1}`,borderRadius:9,padding:"8px 12px",marginBottom:14,fontSize:12,color:T.mu,fontWeight:500}}>Editing your previous rating</div>}
    {tierUp&&<div style={{background:`${tAfter.color}12`,border:`1px solid ${tAfter.color}35`,borderRadius:9,padding:"8px 12px",marginBottom:14,fontSize:12,color:tAfter.color,fontWeight:600}}>This rating will push them to {tAfter.emoji} {tAfter.label}!</div>}
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {CATS.map(c=><div key={c.id}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:13,color:T.txt,fontWeight:500}}>{c.emoji} {c.label}</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:target.color,fontWeight:700,background:`${target.color}14`,padding:"1px 9px",borderRadius:5}}>{vals[c.id]}</span>
        </div>
        <input type="range" min={0} max={100} value={vals[c.id]} onChange={e=>setVals(v=>({...v,[c.id]:+e.target.value}))} style={{width:"100%",accentColor:target.color}}/>
      </div>)}
    </div>
    <button onClick={()=>onSubmit(target.id,{...vals,raterId,raterName,ts:Date.now()})} style={{marginTop:20,width:"100%",padding:"13px 0",background:`linear-gradient(135deg,${target.color}e0,${target.color}90)`,border:"none",borderRadius:11,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
      {isEdit?"Update Rating":"Submit Rating"}
    </button>
  </Overlay>;
}

}

/* ── PHOTO MODAL ── */
function PhotoModal({profile,T,onClose,onSave}){
  const [prev,setPrev]=useState(profile.photo||null);const[cam,setCam]=useState(false);const[stream,setStream]=useState(null);
  const vRef=useRef(null);const cRef=useRef(null);
  useEffect(()=>()=>stream?.getTracks().forEach(t=>t.stop()),[]);
  function pick(){const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPrev(ev.target.result);r.readAsDataURL(f);};i.click();}
  async function startCam(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});setStream(s);setCam(true);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},100);}catch{alert("Camera unavailable");}}
  function stopCam(){stream?.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);}
  function snap(){const v=vRef.current,c=cRef.current;if(!v||!c)return;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);setPrev(c.toDataURL("image/jpeg",.85));stopCam();}
  return <Overlay onBg={()=>{stopCam();onClose();}} T={T}>
    <div style={{fontWeight:700,fontSize:17,color:T.txt,marginBottom:16}}>Profile Photo</div>
    <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
      <div style={{width:104,height:104,borderRadius:"50%",overflow:"hidden",border:`2px solid ${profile.color}50`,background:T.faint,display:"flex",alignItems:"center",justifyContent:"center"}}>

/* ── REPORT MODAL ── */
function ReportModal({target,T,onClose,onSubmit}){
  const [reason,setReason]=useState(null);
  const [alsoBlock,setAlsoBlock]=useState(true);
  const [done,setDone]=useState(false);
  function submit(){
    if(!reason)return;
    onSubmit(target.id,reason,alsoBlock);
    setDone(true);
  }
  if(done)return <Overlay onBg={onClose} T={T}>
    <div style={{textAlign:"center",padding:"16px 0 8px"}}>
      <div style={{fontSize:44,marginBottom:14}}>✅</div>
      <div style={{fontWeight:700,fontSize:17,color:T.txt,marginBottom:8}}>Report submitted</div>
      <p style={{fontSize:13,color:T.mu,lineHeight:1.6,marginBottom:20}}>Thanks for keeping Fama safe.{alsoBlock?` ${target.name} has been blocked.`:""}</p>
      <button onClick={onClose} style={{width:"100%",padding:"12px 0",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:11,color:T.txt,fontWeight:600,cursor:"pointer"}}>Done</button>
    </div>
  </Overlay>;
  return <Overlay onBg={onClose} T={T}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
      <div style={{width:32,height:32,borderRadius:9,background:"#a0303014",border:"1px solid #a0303030",display:"flex",alignItems:"center",justifyContent:"center",color:"#c05050"}}><FlagIcon size={16}/></div>
      <div><div style={{fontWeight:700,fontSize:16,color:T.txt}}>Report {target.name}</div><div style={{fontSize:11,color:T.mu,fontFamily:"'JetBrains Mono',monospace"}}>#{target.id}</div></div>
    </div>
    <div style={{fontSize:12,color:T.mu,marginBottom:12,fontWeight:500}}>Why are you reporting this profile?</div>
    <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:18}}>
      {REPORT_REASONS.map(r=><div key={r.id} onClick={()=>setReason(r.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 13px",background:reason===r.id?`${AC}10`:T.faint,border:`1px solid ${reason===r.id?AC+"40":T.b1}`,borderRadius:10,cursor:"pointer",transition:"all .12s"}}>
        <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${reason===r.id?AC:T.b2}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"border-color .12s"}}>
          {reason===r.id&&<div style={{width:9,height:9,borderRadius:"50%",background:AC}}/>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,color:T.txt}}>{r.label}</div>
          <div style={{fontSize:11,color:T.mu,marginTop:1}}>{r.desc}</div>
        </div>
      </div>)}
    </div>
    <div onClick={()=>setAlsoBlock(!alsoBlock)} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 13px",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:10,cursor:"pointer",marginBottom:16}}>
      <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${alsoBlock?AC:T.b2}`,background:alsoBlock?AC:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .12s"}}>
        {alsoBlock&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:500,color:T.txt}}>Also block this person</div>
        <div style={{fontSize:11,color:T.mu,marginTop:1}}>They won't be able to see or rate your profile</div>
      </div>
    </div>
    <button onClick={submit} disabled={!reason} style={{width:"100%",padding:"12px 0",background:reason?"#a04040":"transparent",border:reason?"none":`1px solid ${T.b1}`,borderRadius:11,color:reason?"#fff":T.mu,fontWeight:700,fontSize:14,cursor:reason?"pointer":"default",transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
      <FlagIcon size={15}/>Submit Report
    </button>
  </Overlay>;
}

/* ── FEED CARD ── */
function FeedCard({p,myId,compact,T,onRate,onView,onMsg,onBlock,onUnblock,onReport,isBlocked,idx}){
  const myR=p.ratings?.find(r=>r.raterId===myId),isSelf=p.id===myId;
  const sc=pScore(p);const t=tierOf(sc??0);
  const [hov,setHov]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const menuRef=useRef(null);
  useEffect(()=>{
    if(!menuOpen)return;
    function handler(e){if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);}
    document.addEventListener("mousedown",handler);document.addEventListener("touchstart",handler);
    return()=>{document.removeEventListener("mousedown",handler);document.removeEventListener("touchstart",handler);};
  },[menuOpen]);
  return <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:T.card,border:`1px solid ${hov?T.b2:T.b1}`,borderRadius:16,padding:compact?"11px 13px":"15px 16px",position:"relative",overflow:"visible",transform:hov?"translateY(-2px)":"",transition:"all .18s",animation:"ci .28s ease both",animationDelay:`${idx*35}ms`}}>
    {/* 3-dot menu */}
    {!isSelf&&<div ref={menuRef} style={{position:"absolute",top:10,right:10,zIndex:50}}>
      <button onClick={e=>{e.stopPropagation();setMenuOpen(v=>!v);}} style={{width:28,height:28,borderRadius:7,background:menuOpen?T.faint:"transparent",border:`1px solid ${menuOpen?T.b2:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.mu,transition:"all .12s"}}>
        <DotsIcon size={15}/>
      </button>
      {menuOpen&&<DotsMenu p={p} myId={myId} isBlocked={isBlocked} T={T} onBlock={onBlock} onUnblock={onUnblock} onReport={()=>onReport(p)} onClose={()=>setMenuOpen(false)}/>}
    </div>}
    <div style={{display:"flex",alignItems:"center",gap:11}}>
      <Ava p={p} size={compact?38:48} T={T}/>
      <div style={{flex:1,minWidth:0,paddingRight:isSelf?0:22}}>
        <div style={{fontWeight:600,fontSize:14,color:T.txt,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
          {p.name}{p.age?<span style={{fontSize:11,color:T.mu,fontWeight:400}}>· {p.age}</span>:null}
          {isSelf&&<span style={{fontSize:9,background:`${AC}18`,color:AC,borderRadius:4,padding:"1px 6px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,border:`1px solid ${AC}28`}}>you</span>}
          {myR&&!isSelf&&<span style={{fontSize:9,background:"#38a06018",color:"#38a060",borderRadius:4,padding:"1px 6px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,border:"1px solid #38a06028"}}>rated</span>}

    <div style={{display:"flex",background:T.faint,borderRadius:10,padding:3,marginBottom:13}}>

/* ── INBOX ── */
function InboxTab({convs,profiles,me,T,onOpen}){

    {sorted.map((conv,i)=>{const other=profiles.find(p=>p.id===conv.oid);if(!other)return null;const last=conv.messages?.at(-1);const unread=conv.messages?.filter(m=>m.sid!==me.id&&!m.read).length||0;

/* ── SEARCH ── */
function SearchTab({profiles,myId,T,onView,onRate,onMsg}){
  const [q,setQ]=useState("");const[res,setRes]=useState(null);const[err,setErr]=useState("");const[mode,setMode]=useState("search");
  const [stream,setStream]=useState(null);const vRef=useRef(null);const cRef=useRef(null);const raf=useRef(null);
  useEffect(()=>()=>{cancelAnimationFrame(raf.current);stream?.getTracks().forEach(t=>t.stop());},[]);
  function findP(raw){if(!raw.trim())return;let id=raw.trim();try{id=new URL(raw).searchParams.get("uid")||id;}catch{}id=id.replace(/[^A-Z0-9]/gi,"").toUpperCase().slice(0,6);const f=profiles.find(p=>p.id===id);f?(setRes(f),setErr("")):(setErr("Profile not found: "+id),setRes(null));}
  async function startCam(){loadScript("https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js",async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});setStream(s);setMode("cam");setTimeout(()=>{if(vRef.current){vRef.current.srcObject=s;vRef.current.play();loop();}},200);}catch{setErr("Camera unavailable");}});}
  function loop(){raf.current=requestAnimationFrame(()=>{const v=vRef.current,c=cRef.current;if(!v||!c||!window.jsQR){loop();return;}if(v.readyState>=2){c.width=v.videoWidth;c.height=v.videoHeight;const ctx=c.getContext("2d");ctx.drawImage(v,0,0);const d=ctx.getImageData(0,0,c.width,c.height);const code=window.jsQR(d.data,d.width,d.height);if(code){stopCam();findP(code.data);return;}}loop();});}
  function stopCam(){cancelAnimationFrame(raf.current);stream?.getTracks().forEach(t=>t.stop());setStream(null);setMode("search");}
  function fromGallery(){loadScript("https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js",()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=img.width;c.height=img.height;c.getContext("2d").drawImage(img,0,0);const d=c.getContext("2d").getImageData(0,0,c.width,c.height);const code=window.jsQR(d.data,d.width,d.height);code?findP(code.data):setErr("No QR found in image");};img.src=ev.target.result;};r.readAsDataURL(f);};i.click();});}
  const filtered=q.length>1?profiles.filter(p=>p.id!==myId&&(p.name.toLowerCase().includes(q.toLowerCase())||p.handle.toLowerCase().includes(q.toLowerCase())||p.id.includes(q.toUpperCase()))).slice(0,7):[];
  const inpSt={flex:1,padding:"11px 13px",background:T.inp,border:`1px solid ${T.b1}`,borderRadius:11,color:T.txt,fontSize:13,outline:"none",fontFamily:"'Inter',sans-serif"};
  return <div style={{padding:"0 14px"}}>
    <div style={{display:"flex",background:T.faint,borderRadius:10,padding:3,marginBottom:12}}>
      {[["search",<NavIcon name="search" size={16}/>],["cam",<CamIcon size={16}/>],["gallery","🖼"],["paste","🔗"]].map(([m,ic])=>
        <button key={m} onClick={()=>{if(m==="cam")startCam();else if(m==="gallery")fromGallery();else{stopCam();setMode(m);}}} style={{flex:1,padding:"8px 0",borderRadius:8,border:mode===m?`1px solid ${T.b1}`:"1px solid transparent",cursor:"pointer",background:mode===m?T.card:"transparent",color:mode===m?T.txt:T.mu,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .12s"}}>{ic}</button>)}
    </div>
    {(mode==="search"||mode==="paste")&&<div>
      <div style={{display:"flex",gap:8,marginBottom:11}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&findP(q)} placeholder={mode==="paste"?"Paste link or #USERID…":"Search name, handle, or ID…"} style={inpSt}/>
        <button onClick={()=>findP(q)} style={{padding:"11px 14px",background:`${AC}18`,border:`1px solid ${AC}30`,borderRadius:11,color:AC,fontWeight:600,cursor:"pointer"}}><NavIcon name="search" size={16}/></button>
      </div>
      {err&&<div style={{color:"#c06060",fontSize:12,padding:"9px 12px",background:"#c0404010",borderRadius:9,border:"1px solid #c0404025",marginBottom:10}}>{err}</div>}
      {filtered.map(p=><div key={p.id} onClick={()=>setRes(p)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:T.card,borderRadius:11,marginBottom:6,cursor:"pointer",border:`1px solid ${T.b1}`,transition:"border-color .13s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.b2} onMouseLeave={e=>e.currentTarget.style.borderColor=T.b1}>
        <Ava p={p} size={40} T={T}/><div style={{flex:1}}><div style={{fontWeight:600,color:T.txt,fontSize:13}}>{p.name}</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.mu,marginTop:1}}>{p.handle} · #{p.id}</div></div><ChevronIcon size={13}/>
      </div>)}
    </div>}
    {mode==="cam"&&<div>
      <div style={{position:"relative",width:"100%",maxWidth:340,margin:"0 auto 11px",aspectRatio:"1",background:"#000",borderRadius:18,overflow:"hidden"}}>
        <video ref={vRef} autoPlay playsInline muted style={{width:"100%",height:"100%",objectFit:"cover"}}/>
        <canvas ref={cRef} style={{display:"none"}}/>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:"58%",height:"58%",border:`1.5px solid ${AC}bb`,borderRadius:10,boxShadow:"0 0 0 9999px rgba(0,0,0,.42)"}}/></div>
        <div style={{position:"absolute",bottom:14,left:0,right:0,textAlign:"center",color:"rgba(255,255,255,.7)",fontSize:11}}>Point camera at QR code</div>
      </div>
      <button onClick={stopCam} style={{display:"block",margin:"0 auto",padding:"9px 24px",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:9,color:T.mu,fontWeight:500,cursor:"pointer",fontSize:12}}>Cancel</button>
    </div>}
    {res&&<div style={{background:T.card,border:`1px solid ${tierOf(pScore(res)||0).color}28`,borderRadius:14,padding:"14px",marginTop:7,animation:"su .18s ease"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:11}}>
        <Ava p={res} size={48} T={T}/>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14,color:T.txt}}>{res.name}</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.mu,marginTop:1}}>{res.handle}</div><div style={{marginTop:5}}><TierBadge sc={pScore(res)} size="sm"/></div></div>
        {pScore(res)!=null&&<ScorePill sc={pScore(res)}/>}
      </div>
      <div style={{display:"flex",gap:7}}>
        <button onClick={()=>onView(res)} style={{flex:1,padding:"8px 0",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:9,color:T.txt,fontSize:12,fontWeight:500,cursor:"pointer"}}>View</button>
        {res.id!==myId&&<><button onClick={()=>onRate(res,res.ratings?.find(r=>r.raterId===myId))} style={{flex:1,padding:"8px 0",background:`${res.color}14`,border:`1px solid ${res.color}28`,borderRadius:9,color:res.color,fontSize:12,fontWeight:600,cursor:"pointer"}}>Rate</button>
        <button onClick={()=>onMsg(res)} style={{padding:"8px 12px",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:9,color:T.mu,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><MsgIcon size={15}/></button></>}
      </div>
    </div>}
  </div>;
}

/* ── SCORE CARD MODAL ── */
function ScoreCardModal({profile,T,onClose}){
  const sc=pScore(profile),n=(profile.ratings||[]).length,t=tierOf(sc??0);
  const isFama=t.label==="HighEnough";
  const canvasRef=useRef(null);
  const [saved,setSaved]=useState(false);

  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=800,H=800;canvas.width=W;canvas.height=H;
    // BG
    const bgGrad=ctx.createLinearGradient(0,0,W,H);
    bgGrad.addColorStop(0,"#0d0c1e");bgGrad.addColorStop(1,"#09090f");
    ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
    // Glow blob
    const glow=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,340);
    glow.addColorStop(0,t.color+"28");glow.addColorStop(1,"transparent");
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
    // Card BG
    ctx.fillStyle="#12111e";ctx.beginPath();ctx.roundRect(60,60,W-120,H-120,32);ctx.fill();
    ctx.strokeStyle=t.color+"40";ctx.lineWidth=1.5;ctx.stroke();
    // App name
    ctx.font="600 28px 'Inter',Arial";ctx.fillStyle="#ffffff40";ctx.textAlign="left";
    ctx.fillText("HighEnough",96,118);
    // Avatar circle
    ctx.beginPath();ctx.arc(W/2,240,80,0,Math.PI*2);
    ctx.fillStyle=profile.color+"30";ctx.fill();
    ctx.strokeStyle=profile.color+"70";ctx.lineWidth=3;ctx.stroke();
    // Initials in avatar
    const initials=ini(profile.name);
    ctx.font="bold 52px 'Inter',Arial";ctx.fillStyle=profile.color;ctx.textAlign="center";
    ctx.fillText(initials,W/2,257);
    // Name
    ctx.font="bold 48px 'Inter',Arial";ctx.fillStyle="#f0f0ff";ctx.textAlign="center";
    ctx.fillText(profile.name,W/2,350);
    // Handle
    ctx.font="500 26px 'JetBrains Mono',monospace";ctx.fillStyle="#5a5a90";
    ctx.fillText(profile.handle,W/2,390);
    // Score
    ctx.font="bold 120px 'JetBrains Mono',monospace";ctx.fillStyle=t.color;
    ctx.fillText(sc!=null?fmtScore(sc):"—",W/2,510);
    ctx.font="600 22px 'Inter',Arial";ctx.fillStyle=t.color+"bb";
    ctx.fillText("pts",W/2,545);
    // Tier badge
    ctx.font="bold 28px 'Inter',Arial";ctx.fillStyle=t.color;
    ctx.fillText(`${t.emoji} ${t.label}`,W/2,600);
    // Cat bars
    const barW=88,barH=8,barY=660,gap=14,total=CATS.length,allW=total*(barW+gap)-gap;
    const startX=(W-allW)/2;
    CATS.forEach((c,i)=>{
      const v=cAvg(profile,c.id)/100;
      const x=startX+i*(barW+gap);
      ctx.fillStyle="#1e1e2c";ctx.beginPath();ctx.roundRect(x,barY,barW,barH,4);ctx.fill();
      if(v>0){ctx.fillStyle=profile.color+"cc";ctx.beginPath();ctx.roundRect(x,barY,barW*v,barH,4);ctx.fill();}
      ctx.font="500 18px 'Inter',Arial";ctx.fillStyle="#5a5a90";ctx.textAlign="center";
      ctx.fillText(c.emoji,x+barW/2,barY+32);
    });
    // Rating count
    ctx.font="500 22px 'Inter',Arial";ctx.fillStyle="#3a3a60";ctx.textAlign="center";
    ctx.fillText(`${n} rating${n!==1?"s":""}`,W/2,760);
  },[profile]);

  function download(){
    const canvas=canvasRef.current;if(!canvas)return;
    const link=document.createElement("a");link.download=`${profile.name.replace(/\s+/g,"_")}_HighEnough.png`;
    link.href=canvas.toDataURL("image/png");link.click();setSaved(true);setTimeout(()=>setSaved(false),2000);
  }

  return <Overlay onBg={onClose} T={T} wide>
    <div style={{fontWeight:700,fontSize:17,color:T.txt,marginBottom:4}}>Score Card</div>
    <div style={{fontSize:12,color:T.mu,marginBottom:16}}>Download and share your rank on social media</div>
    <canvas ref={canvasRef} style={{width:"100%",borderRadius:16,border:`1px solid ${T.b1}`,display:"block",marginBottom:16}}/>
    <div style={{display:"flex",gap:8}}>
      <button onClick={download} style={{flex:1,padding:"12px 0",background:`linear-gradient(135deg,${AC}e0,${AC}90)`,border:"none",borderRadius:11,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
        {saved?"Saved! ✓":"⬇ Download Card"}
      </button>
      <button onClick={()=>{const canvas=canvasRef.current;if(!canvas)return;canvas.toBlob(b=>{try{navigator.share({files:[new File([b],"highenough.png",{type:"image/png"})],title:"My HighEnough Score"});}catch{download();}});}} style={{padding:"12px 16px",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:11,color:T.mu,fontWeight:600,fontSize:13,cursor:"pointer"}}>
        Share
      </button>
    </div>
  </Overlay>;
}

const DP={dark:true,compact:false,nRatings:true,nEdits:true,nTier:true,nMsg:true,disc:true,pub:true,anon:false};

function App(){
  const [st,setSt]=useState(()=>ldSt());
  const [tab,setTab]=useState("feed");
  const [rateT,setRateT]=useState(null);const[viewT,setViewT]=useState(null);const[qrT,setQRT]=useState(null);
  const [settings,setSettings]=useState(false);const[photo,setPhoto]=useState(false);
  const [chat,setChat]=useState(null);const[showN,setShowN]=useState(false);const[tierMap,setTierMap]=useState(false);
  const [reportT,setReportT]=useState(null);const[showBlocked,setShowBlocked]=useState(false);
  const [scoreCard,setScoreCard]=useState(null);
  const [showAdminLock,setShowAdminLock]=useState(false);const[showAdmin,setShowAdmin]=useState(false);
  const [adminTaps,setAdminTaps]=useState(0);
  const [toast,setToast]=useState(null);

  const me=st.me||null,loggedIn=st.loggedIn||false,profiles=st.profiles||[];
  const prefs={...DP,...(st.prefs||{})};const T=prefs.dark?DK:LT;
  const notifs=st.notifs||[];const convs=st.convs||[];
  const blocked=st.blocked||[];const reports=st.reports||[];

  function upd(fn){setSt(prev=>{const next=fn(prev);svSt(next);return next;});}
  function pop(msg){setToast(msg);setTimeout(()=>setToast(null),2400);}

  // ── Supabase sync on mount ──
  useEffect(()=>{
    if(!SB_READY||!me)return;
    (async()=>{
      // Sync own profile to Supabase
      await DB.upsertProfile(me);
      // Fetch all profiles
      const remote=await DB.getProfiles();
      if(remote&&remote.length>0){
        upd(prev=>{
          const localIds=new Set((prev.profiles||[]).map(p=>p.id));
          const newRemote=remote.filter(r=>r.id!==me.id&&!localIds.has(r.id)).map(r=>({
            id:r.id, name:r.name, handle:r.handle, bio:r.bio,
            color:r.color, age:r.age, photo:r.photo,
            interests:r.interests||[], links:r.links||{},
            createdAt:new Date(r.created_at).getTime(), ratings:[]
          }));
          return newRemote.length>0?{...prev,profiles:[...(prev.profiles||[]),...newRemote]}:prev;
        });
      }
      // Fetch blocked list
      const remoteBlocked=await DB.getBlocked(me.id);
      if(remoteBlocked) upd(prev=>({...prev,blocked:remoteBlocked}));
    })();
  },[me?.id]);
  function handleCreated(p){
    upd(()=>({me:p,loggedIn:true,profiles:[{...p,ratings:[]}],prefs,notifs:[],convs:[]}));
    if(SB_READY) DB.upsertProfile(p);
    pop("Welcome to HighEnough ✦");
  }
  function handleLogin(){upd(prev=>({...prev,loggedIn:true}));}
  function handleLogout(){upd(prev=>({...prev,loggedIn:false}));setSettings(false);setTab("feed");}
  function handleNewAccount(){upd(()=>({}));}
  function handleRate(p,ex){if(!me||p.id===me.id)return pop("You can't rate yourself");if(blocked.includes(p.id))return pop("You've blocked this user");setRateT({profile:p,existing:ex});}
  function handleSubmit(tid,sc2){
    const isEdit=!!rateT?.existing;
    upd(prev=>{
      const before=prev.profiles?.find(p=>p.id===tid);
      const beforeSc=pScore(before)||0;
      const p2=(prev.profiles||[]).map(p=>{if(p.id!==tid)return p;const ex=p.ratings?.find(r=>r.raterId===sc2.raterId);return{...p,ratings:ex?p.ratings.map(r=>r.raterId===sc2.raterId?sc2:r):[...(p.ratings||[]),sc2]};});
      const after=p2.find(p=>p.id===tid);const afterSc=pScore(after)||0;
      const tBefore=tierOf(beforeSc),tAfter=tierOf(afterSc);
      const tierTxt=tAfter.label!==tBefore.label&&TIERS.indexOf(tAfter)>TIERS.indexOf(tBefore)?` — reached ${tAfter.emoji} ${tAfter.label}!`:"";
      const nn={type:isEdit?"edit":"rating",actorId:me.id,text:(isEdit?"updated their rating":"rated you")+tierTxt,ts:Date.now(),read:false};
      return{...prev,profiles:p2,notifs:[nn,...(prev.notifs||[])].slice(0,60)};
    });setRateT(null);
    if(SB_READY) DB.upsertRating({...sc2,targetId:tid});
    pop(isEdit?"Rating updated":"Rating submitted");
  }
  function handleMsg(other){
    const cid=[me.id,other.id].sort().join("_");
    upd(prev=>{const c=prev.convs||[];if(c.find(x=>x.id===cid))return prev;return{...prev,convs:[...c,{id:cid,oid:other.id,messages:[]}]};});
    const ex=convs.find(c=>c.id===cid)||{id:cid,oid:other.id,messages:[]};setChat({...ex,other});
  }
  function handleSend(cid,txt){
    const msg={sid:me.id,txt,ts:Date.now(),read:false};
    upd(prev=>({...prev,convs:(prev.convs||[]).map(c=>c.id===cid?{...c,messages:[...(c.messages||[]),msg]}:c)}));
    setChat(prev=>({...prev,messages:[...(prev.messages||[]),msg]}));
  }
  function handleSaveProfile(u){upd(prev=>({...prev,me:{...prev.me,...u},profiles:(prev.profiles||[]).map(p=>p.id===me.id?{...p,...u}:p)}));pop("Profile saved");}
  function handleSavePhoto(ph){handleSaveProfile({photo:ph});setPhoto(false);pop("Photo updated");}
  function handleSavePrefs(p){upd(prev=>({...prev,prefs:p}));}
  function handleDelete(){localStorage.removeItem(SK);setSt({});setSettings(false);}
  function handleMarkNotif(idx){upd(prev=>({...prev,notifs:idx==="all"?(prev.notifs||[]).map(n=>({...n,read:true})):(prev.notifs||[]).map((n,i)=>i===idx?{...n,read:true}:n)}));}
  function handleBlock(uid){upd(prev=>({...prev,blocked:[...(prev.blocked||[]).filter(x=>x!==uid),uid]}));if(SB_READY&&me)DB.block(me.id,uid);pop("User blocked");}
  function handleUnblock(uid){upd(prev=>({...prev,blocked:(prev.blocked||[]).filter(x=>x!==uid)}));if(SB_READY&&me)DB.unblock(me.id,uid);pop("User unblocked");}
  function handleReport(targetId,reasonId,alsoBlock){
    const r={targetId,reasonId,ts:Date.now(),reporterId:me.id};
    upd(prev=>({...prev,reports:[r,...(prev.reports||[])].slice(0,200),blocked:alsoBlock?[...(prev.blocked||[]).filter(x=>x!==targetId),targetId]:(prev.blocked||[])}));
    if(SB_READY) DB.fileReport(r);
    if(SB_READY&&alsoBlock&&me) DB.block(me.id,targetId);
  }
  function handleAdminTap(){
    const next=adminTaps+1;setAdminTaps(next);
    if(next>=5){setShowAdminLock(true);setAdminTaps(0);}
    setTimeout(()=>setAdminTaps(0),3000);
  }
  function handleDeleteProfile(id){upd(prev=>({...prev,profiles:(prev.profiles||[]).filter(p=>p.id!==id)}));pop("Profile deleted");}
  function handleClearRatings(id){upd(prev=>({...prev,profiles:(prev.profiles||[]).map(p=>p.id===id?{...p,ratings:[]}:p)}));pop("Ratings cleared");}
  function handleExport(type){
    const data=type==="all"?st:type==="profiles"?{profiles:profiles.map(p=>({...p,ratings:p.ratings||[]}))}:{reports};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`highenough_${type}_${Date.now()}.json`;a.click();
    pop("Exported ✓");
  }
  function addDemos(){
    const demos=[{name:"Jordan Lee",handle:"@jordanlee",bio:"Just vibes.",color:"#10a37f",age:24,interests:["Music 🎵","Gaming 🎮","Art 🎨"]},{name:"Sam Rivera",handle:"@samr",bio:"Coffee & code.",color:"#e0466e",age:27,interests:["Tech 💻","Travel ✈️","Photography 📷"]},{name:"Alex Kim",handle:"@alexkim",bio:"Rizz is a lifestyle.",color:"#4f80e2",age:22,interests:["Fashion 👗","Dance 💃","Comedy 😄"]},{name:"Riley Cho",handle:"@rileycho",bio:"Living the dream.",color:"#c08a2e",age:25,interests:["Fitness 💪","Food 🍜","Movies 🎬"]}];
    const ex=new Set(profiles.map(p=>p.handle));
    const add=demos.filter(d=>!ex.has(d.handle)).map(d=>({...d,id:uid(),photo:null,links:{},ratings:[
      {...Object.fromEntries(CATS.map(c=>[c.id,Math.floor(Math.random()*40+55)])),raterId:"B1",raterName:"Bot A",ts:Date.now()-3*24*60*60*1000},
      {...Object.fromEntries(CATS.map(c=>[c.id,Math.floor(Math.random()*40+55)])),raterId:"B2",raterName:"Bot B",ts:Date.now()-60*60*1000},
      {...Object.fromEntries(CATS.map(c=>[c.id,Math.floor(Math.random()*40+55)])),raterId:"B3",raterName:"Bot C",ts:Date.now()-2*60*60*1000},
    ],createdAt:Date.now()}));
    if(!add.length)return pop("Already added!");
    upd(prev=>({...prev,profiles:[...(prev.profiles||[]),...add]}));pop(`Added ${add.length} people`);
  }

  useEffect(()=>{document.body.style.background=T.bg;document.body.style.color=T.txt;},[T.bg,T.txt]);

  if(!me)return <Onboard T={DK} onDone={handleCreated}/>;
  if(!loggedIn)return <LoginScreen me={me} T={T} onLogin={handleLogin} onNewAccount={handleNewAccount}/>;

  const myP=profiles.find(p=>p.id===me.id)||{...me,ratings:[]};
  const unreadN=notifs.filter(n=>!n.read).length;
  const unreadM=convs.reduce((s,c)=>s+(c.messages?.filter(m=>m.sid!==me.id&&!m.read).length||0),0);
  const myPsc=pScore(myP);const myTier=tierOf(myPsc??0);
  const NAV=[{id:"feed",icon:"feed",label:"Feed"},{id:"search",icon:"search",label:"Search"},{id:"board",icon:"board",label:"Board"},{id:"ratings",icon:"ratings",label:"Ratings"},{id:"inbox",icon:"inbox",label:"Inbox",badge:unreadM}];
  const TITLES={search:"Find People",board:"Leaderboard",ratings:"Ratings",inbox:"Messages"};

  return <>
    <div style={{minHeight:"100vh",background:T.bg,color:T.txt,paddingBottom:78}}>
      {/* TOP BAR */}
      <div style={{background:T.nav,borderBottom:`1px solid ${T.b1}`,padding:"13px 16px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontWeight:800,fontSize:22,letterSpacing:"-1px",lineHeight:1,color:T.txt,cursor:"pointer",userSelect:"none",display:"flex",alignItems:"center",gap:7}} onClick={handleAdminTap}>
          <span>High<span style={{color:AC,fontWeight:300,letterSpacing:"0.05em"}}>Enough</span></span>
          {SB_READY&&<div title="Connected to Supabase" style={{width:7,height:7,borderRadius:"50%",background:"#10a37f",boxShadow:"0 0 6px #10a37f99",flexShrink:0}}/>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {tab==="feed"&&<button onClick={addDemos} style={{background:"transparent",border:`1px solid ${T.b1}`,borderRadius:7,padding:"5px 10px",color:T.mu,fontSize:11,cursor:"pointer",fontWeight:500}}>+ Demo</button>}
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setShowN(true)}>
            <div style={{width:36,height:36,borderRadius:10,background:T.faint,border:`1px solid ${T.b1}`,display:"flex",alignItems:"center",justifyContent:"center",color:T.mu}}><BellIcon/></div>
            {unreadN>0&&<div style={{position:"absolute",top:-3,right:-3,minWidth:15,height:15,borderRadius:99,background:"#c04040",border:`1.5px solid ${T.nav}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700,padding:"0 3px"}}>{unreadN>9?"9+":unreadN}</div>}
          </div>
          <Ava p={myP} size={36} T={T} onClick={()=>setSettings(true)}/>
        </div>
      </div>

      {/* FEED HERO */}
      {tab==="feed"&&<div style={{padding:"13px 14px 0"}}>
        <div style={{background:T.card,border:`1px solid ${T.b1}`,borderRadius:16,padding:"13px 15px",marginBottom:13,display:"flex",alignItems:"center",gap:12,animation:"ci .3s ease"}}>
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setPhoto(true)}>
            <Ava p={myP} size={52} T={T}/>
            <div style={{position:"absolute",bottom:-2,right:-2,width:18,height:18,borderRadius:"50%",background:`${me.color}cc`,border:`1.5px solid ${T.card}`,display:"flex",alignItems:"center",justifyContent:"center"}}><EditIcon size={9}/></div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15,color:T.txt}}>{me.name}{me.age?<span style={{fontSize:12,color:T.mu,fontWeight:400,marginLeft:5}}>· {me.age}</span>:null}</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.mu,marginTop:1}}>{me.handle}</div>
            <div style={{marginTop:6}}><TierBadge sc={myPsc} size="sm"/></div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
            {myPsc!=null?<ScorePill sc={myPsc}/>:<div style={{fontSize:11,color:T.mu}}>Unrated</div>}
            <div style={{display:"flex",gap:6}}>
              {myPsc!=null&&<button onClick={()=>setScoreCard(myP)} style={{padding:"5px 9px",background:`${AC}14`,border:`1px solid ${AC}28`,borderRadius:7,color:AC,fontSize:11,fontWeight:500,cursor:"pointer"}}>Card</button>}
              <button onClick={()=>setQRT(myP)} style={{padding:"5px 9px",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:7,color:T.mu,fontSize:11,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}><QrIcon size={13}/>Share</button>
            </div>
          </div>
        </div>
      </div>}

      {tab!=="feed"&&<div style={{padding:"15px 16px 0"}}><div style={{fontWeight:700,fontSize:20,color:T.txt,animation:"ci .22s ease"}}>{TITLES[tab]}</div></div>}

      <div style={{paddingTop:tab!=="feed"?13:0}}>
        {tab==="feed"&&<div style={{padding:"0 14px"}}>
          {profiles.length===0
            ?<div style={{textAlign:"center",padding:"55px 0",color:T.mu}}><div style={{fontSize:36,marginBottom:11,opacity:.3}}>◎</div><div style={{fontWeight:500}}>Nobody here yet</div><div style={{fontSize:12,marginTop:5,opacity:.7}}>Tap + Demo or Search to add people</div></div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:10}}>{profiles.filter(p=>p.id!==me.id&&!blocked.includes(p.id)).map((p,i)=><FeedCard key={p.id} p={p} myId={me.id} compact={prefs.compact} T={T} onRate={handleRate} onView={setViewT} onMsg={handleMsg} onBlock={handleBlock} onUnblock={handleUnblock} onReport={setReportT} isBlocked={blocked.includes(p.id)} idx={i}/>)}</div>}
        </div>}
        {tab==="search"  &&<SearchTab profiles={profiles} myId={me.id} T={T} onView={setViewT} onRate={p=>handleRate(p,p.ratings?.find(r=>r.raterId===me.id))} onMsg={handleMsg}/>}
        {tab==="board"   &&<LeaderboardTab profiles={profiles} myId={me.id} T={T} onView={setViewT} onTierMap={()=>setTierMap(true)}/>}
        {tab==="ratings" &&<RatingsDash profiles={profiles} myId={me.id} T={T} onView={setViewT} onRate={handleRate}/>}
        {tab==="inbox"   &&<InboxTab convs={convs} profiles={profiles} me={me} T={T} onOpen={(conv,other)=>setChat({...conv,other})}/>}
      </div>
    </div>

    {/* BOTTOM NAV */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:T.nav,borderTop:`1px solid ${T.b1}`,display:"flex",padding:"9px 0 16px",zIndex:100}}>
      {NAV.map(({id,icon,label,badge})=>
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:tab===id?AC:T.mu,transition:"color .15s"}}>
          <div style={{position:"relative",display:"inline-flex",padding:"4px 8px",borderRadius:10,background:tab===id?`${AC}14`:"transparent",transition:"background .15s"}}>
            <NavIcon name={icon} active={tab===id} size={21}/>
            {badge>0&&<div style={{position:"absolute",top:-2,right:-2,minWidth:14,height:14,borderRadius:99,background:"#c04040",border:`1.5px solid ${T.nav}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:700,padding:"0 2px"}}>{badge>9?"9+":badge}</div>}
          </div>
          <span style={{fontSize:8,textTransform:"uppercase",letterSpacing:".08em",fontWeight:tab===id?600:400}}>{label}</span>
        </button>)}
    </div>

    {rateT   &&<RateModal target={rateT.profile} raterId={me.id} raterName={prefs.anon?"Anonymous":me.name} existing={rateT.existing} T={T} onClose={()=>setRateT(null)} onSubmit={handleSubmit}/>}
    {viewT   &&<ViewModal profile={viewT} isSelf={viewT.id===me.id} myId={me.id} T={T} onClose={()=>setViewT(null)} onRate={handleRate} onQR={setQRT} onMsg={handleMsg} onTierMap={()=>setTierMap(true)} onBlock={handleBlock} onUnblock={handleUnblock} onReport={setReportT} isBlocked={blocked.includes(viewT.id)}/>}
    {qrT     &&<QRModal profile={qrT} T={T} onClose={()=>setQRT(null)}/>}
    {settings&&<SettingsModal me={me} prefs={prefs} T={T} onClose={()=>setSettings(false)} onSaveProfile={handleSaveProfile} onSavePrefs={handleSavePrefs} onDelete={handleDelete} onEditPhoto={()=>{setSettings(false);setPhoto(true);}} onLogout={handleLogout} onShowBlocked={()=>setShowBlocked(true)}/>}
    {photo   &&<PhotoModal profile={myP} T={T} onClose={()=>setPhoto(false)} onSave={handleSavePhoto}/>}
    {chat    &&<ChatModal conv={chat} me={me} T={T} onClose={()=>setChat(null)} onSend={handleSend}/>}
    {showN   &&<NotifsPanel notifs={notifs} profiles={profiles} T={T} onClose={()=>setShowN(false)} onMark={handleMarkNotif} onView={p=>{setViewT(p);setShowN(false);}}/>}
    {tierMap &&<TierMapPanel T={T} onClose={()=>setTierMap(false)}/>}
    {reportT &&<ReportModal target={reportT} T={T} onClose={()=>setReportT(null)} onSubmit={handleReport}/>}
    {showBlocked&&<BlockedListPanel blocked={blocked} profiles={profiles} T={T} onClose={()=>setShowBlocked(false)} onUnblock={handleUnblock}/>}
    {scoreCard&&<ScoreCardModal profile={scoreCard} T={T} onClose={()=>setScoreCard(null)}/>}
    {showAdminLock&&<AdminLock T={T} onClose={()=>setShowAdminLock(false)} onUnlock={()=>{setShowAdminLock(false);setShowAdmin(true);}}/>}
    {showAdmin&&<AdminPanel profiles={profiles} reports={reports} blocked={blocked} T={T} onClose={()=>setShowAdmin(false)} onDeleteProfile={handleDeleteProfile} onClearRatings={handleClearRatings} onExport={handleExport}/>}
    <Toast msg={toast} T={T}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
