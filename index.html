/* ── PHOTO MODAL ── */
function PhotoModal({profile,T,onClose,onSave}){
  const [prev,setPrev]=useState(profile.photo||null);const[cam,setCam]=useState(false);const[stream,setStream]=useState(null);
  const vRef=useRef(null);const cRef=useRef(null);
  useEffect(()=>()=>stream?.getTracks().forEach(t=>t.stop()),[]);
  function pick(){const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPrev(ev.target.result);r.readAsDataURL(f);};i.click();}
  async function startCam(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});setStream(s);setCam(true);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},100);}catch{alert("Camera unavailable");}}
  function stopCam(){stream?.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);}
  function snap(){const v=vRef.current,c=cRef.current;if(!v||!c)return;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);setPrev(c.toDataURL("image/jpeg",.85));stopCam();}
  return<Overlay onBg={()=>{stopCam();onClose();}} T={T} bottom>
    <div style={{fontWeight:700,fontSize:17,color:T.txt,marginBottom:16}}>Profile Photo</div>
    <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
      <div style={{width:110,height:110,borderRadius:"50%",overflow:"hidden",border:`2px solid ${profile.color}50`,background:T.faint,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {cam?<video ref={vRef} autoPlay playsInline style={{width:"100%",height:"100%",objectFit:"cover"}}/>:prev?<img src={prev} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:32,fontWeight:700,color:profile.color}}>{ini(profile.name)}</span>}
      </div>
      <canvas ref={cRef} style={{display:"none"}}/>
    </div>
    {cam?<div style={{display:"flex",gap:8}}><button onClick={snap} style={{flex:1,padding:"12px 0",background:`${profile.color}cc`,borderRadius:12,color:"#fff",fontWeight:700}}>📸 Capture</button><button onClick={stopCam} style={{flex:1,padding:"12px 0",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:12,color:T.mu}}>Cancel</button></div>
      :<div style={{display:"flex",flexDirection:"column",gap:9}}>
        <button onClick={pick} style={{padding:"13px 0",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:12,color:T.txt,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><CamIcon/>Choose from Gallery</button>
        <button onClick={startCam} style={{padding:"13px 0",background:T.faint,border:`1px solid ${T.b1}`,borderRadius:12,color:T.txt,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><CamIcon/>Take Photo</button>
        {prev&&<button onClick={()=>setPrev(null)} style={{padding:"12px 0",background:"transparent",border:"1px solid #c0404040",borderRadius:12,color:"#c06060",fontWeight:500}}>Remove Photo</button>}
        <div style={{height:1,background:T.b1}}/>
        <button onClick={()=>onSave(prev)} style={{padding:"13px 0",background:`linear-gradient(135deg,${profile.color}e0,${profile.color}90)`,borderRadius:12,color:"#fff",fontWeight:700}}>Save Photo</button>
      </div>}
  </Overlay>;
}

/* ── SCORE CARD MODAL — rich visual design ── */
function ScoreCardModal({profile,T,onClose}){
  const isBiz=profile.account_type==="business";
  const cats=getCats(profile);
  const sc=pScore(profile),n=(profile.ratings||[]).length,t=tierOf(sc??0,isBiz);
  const canvasRef=useRef(null);const[saved,setSaved]=useState(false);
  const profileUrl=getProfileUrl(profile);
  const col=profile.color||AC;

  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=900,H=isBiz?1080:1240;
    canvas.width=W;canvas.height=H;

    // ── Shared helper: draw clean white card shell ──
    function drawShell(label){
      // White background
      ctx.fillStyle="#f5f5fa";ctx.fillRect(0,0,W,H);
      // Top accent bar (tier gradient)
      const topBar=ctx.createLinearGradient(0,0,W,0);topBar.addColorStop(0,t.color);topBar.addColorStop(1,t.grad[1]);ctx.fillStyle=topBar;ctx.fillRect(0,0,W,10);
      // White card with soft shadow
      ctx.fillStyle="#ffffff";ctx.shadowColor="rgba(0,0,0,.09)";ctx.shadowBlur=32;ctx.shadowOffsetY=6;ctx.beginPath();ctx.roundRect(36,36,W-72,H-72,22);ctx.fill();ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      // Card border
      ctx.strokeStyle=t.color+"28";ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(36,36,W-72,H-72,22);ctx.stroke();
      // Logo — top-left
      ctx.textAlign="left";ctx.font="800 34px Inter,Arial,sans-serif";ctx.fillStyle="#111126";
      const hiW=ctx.measureText("High").width;ctx.fillText("High",76,100);
      ctx.font="300 34px Inter,Arial,sans-serif";ctx.fillStyle="#7b72e9";ctx.fillText("Enough",76+hiW+2,100);
      // Subtitle badge — top-right
      ctx.fillStyle=t.color+"14";ctx.strokeStyle=t.color+"40";ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(W-210,72,134,32,7);ctx.fill();ctx.stroke();
      ctx.textAlign="center";ctx.font="600 12px Inter,Arial,sans-serif";ctx.fillStyle=t.color;ctx.fillText(label,W-143,93);
      // Divider
      ctx.strokeStyle="#e6e6f0";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(76,118);ctx.lineTo(W-76,118);ctx.stroke();
    }

    // ── Shared: avatar circle ──
    function drawAvatar(aX,aY,aR){
      ctx.beginPath();ctx.arc(aX,aY,aR,0,Math.PI*2);ctx.fillStyle=profile.color+"18";ctx.fill();
      ctx.strokeStyle=profile.color+"70";ctx.lineWidth=3;ctx.stroke();
      ctx.font=`bold ${aR*.82}px Inter,Arial`;ctx.fillStyle=profile.color;ctx.textAlign="center";ctx.fillText(ini(profile.name),aX,aY+aR*.3);
    }

    // ── Shared: name + handle ──
    function drawName(y1,y2){
      ctx.textAlign="center";ctx.font="bold 46px Inter,Arial,sans-serif";ctx.fillStyle="#111126";ctx.fillText(profile.name,W/2,y1);
      ctx.font="500 20px 'JetBrains Mono',monospace";ctx.fillStyle="#8888a8";ctx.fillText(profile.handle||"",W/2,y2);
    }

    // ── Shared: tier badge ──
    function drawTier(y){
      const tierLabel=`${t.emoji}  ${t.label.toUpperCase()}`;
      ctx.textAlign="center";ctx.font="700 22px Inter,Arial,sans-serif";
      const tlW=ctx.measureText(tierLabel).width+40,tlX=W/2-tlW/2;
      ctx.fillStyle=t.color+"16";ctx.strokeStyle=t.color+"45";ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(tlX,y,tlW,40,9);ctx.fill();ctx.stroke();
      ctx.fillStyle=t.color;ctx.fillText(tierLabel,W/2,y+27);
    }

    // ── Shared: category bars ──
    function drawBars(bY){
      const bH=8,bGap=12,bW=(W-160-(cats.length-1)*bGap)/cats.length,startX=80;
      cats.forEach((c,i)=>{
        const v=cAvg(profile,c.id)/100,x=startX+i*(bW+bGap);
        ctx.fillStyle="#ebebf4";ctx.beginPath();ctx.roundRect(x,bY,bW,bH,4);ctx.fill();
        if(v>0){
          const bg2=ctx.createLinearGradient(x,0,x+bW,0);bg2.addColorStop(0,profile.color+"cc");bg2.addColorStop(1,t.color+"99");
          ctx.fillStyle=bg2;ctx.beginPath();ctx.roundRect(x,bY,bW*v,bH,4);ctx.fill();
        }
        ctx.font="600 18px Inter,Arial";ctx.fillStyle="#555570";ctx.textAlign="center";ctx.fillText(c.emoji,x+bW/2,bY+34);
        ctx.font="500 12px Inter,Arial";ctx.fillStyle="#9090b0";ctx.fillText(c.label,x+bW/2,bY+52);
      });
    }

    // ── Shared: UID row ──
    function drawUID(y1,y2){
      ctx.textAlign="center";ctx.font="500 12px 'JetBrains Mono',monospace";ctx.fillStyle="#aaaacc";ctx.fillText("UNIQUE ID",W/2,y1);
      ctx.font="800 38px 'JetBrains Mono',monospace";ctx.fillStyle=t.color;ctx.fillText(`#${profile.short_id||shortId(profile.id)}`,W/2,y2);
    }

    // ── Shared: footer box ──
    function drawFooter(fy,sub){
      ctx.fillStyle="#f0f0f8";ctx.strokeStyle="#e2e2ee";ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(76,fy,W-152,120,14);ctx.fill();ctx.stroke();
      ctx.textAlign="center";ctx.font="800 28px Inter,Arial,sans-serif";ctx.fillStyle="#111126";
      const hiF=ctx.measureText("High").width;const lsx=W/2-(hiF+ctx.measureText("Enough").width+4)/2;
      ctx.textAlign="left";ctx.fillText("High",lsx,fy+50);
      ctx.font="300 28px Inter,Arial,sans-serif";ctx.fillStyle="#7b72e9";ctx.fillText("Enough",lsx+hiF+4,fy+50);
      ctx.textAlign="center";ctx.font="500 13px 'JetBrains Mono',monospace";ctx.fillStyle="#9090b0";ctx.fillText(sub,W/2,fy+78);
      ctx.font="500 11px 'JetBrains Mono',monospace";ctx.fillStyle=t.color+"aa";ctx.fillText(profileUrl,W/2,fy+102);
    }

    if(isBiz){
      drawShell("🏢 Business Review");
      drawAvatar(W/2,252,78);
      drawName(378,410);
      ctx.textAlign="center";ctx.font="900 108px 'JetBrains Mono',monospace";
      const sg=ctx.createLinearGradient(W/2-120,430,W/2+120,540);sg.addColorStop(0,t.grad[0]);sg.addColorStop(1,t.grad[1]);ctx.fillStyle=sg;ctx.fillText(sc!=null?fmtScore(sc):"—",W/2,540);
      ctx.font="600 18px Inter,Arial,sans-serif";ctx.fillStyle="#9090b0";ctx.fillText("Overall Score",W/2,568);
      drawTier(586);
      drawBars(644);
      drawUID(730,766);
      drawFooter(796,"HighEnough.in  ·  for Business");
    } else {
      // ── Personal card: full redesign ──
      const W=900,H=1240;

      // ── Background: white with subtle decorative dots ──
      ctx.fillStyle="#f7f7fc";ctx.fillRect(0,0,W,H);
      // Dot grid pattern
      ctx.fillStyle=t.color+"12";
      for(let x=40;x<W;x+=38)for(let y=40;y<H;y+=38){ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();}
      // Top gradient band
      const topGrad=ctx.createLinearGradient(0,0,W,0);topGrad.addColorStop(0,t.color);topGrad.addColorStop(1,t.grad[1]);
      ctx.fillStyle=topGrad;ctx.fillRect(0,0,W,14);
      // Bottom mirror band
      ctx.fillStyle=topGrad;ctx.fillRect(0,H-14,W,14);

      // ── White card panel ──
      ctx.fillStyle="#ffffff";ctx.shadowColor="rgba(80,60,160,.13)";ctx.shadowBlur=40;ctx.shadowOffsetY=8;
      ctx.beginPath();ctx.roundRect(44,44,W-88,H-88,26);ctx.fill();ctx.shadowBlur=0;ctx.shadowOffsetY=0;
      ctx.strokeStyle=t.color+"30";ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(44,44,W-88,H-88,26);ctx.stroke();

      // ── Logo row ──
      ctx.textAlign="left";ctx.font="800 32px Inter,Arial,sans-serif";ctx.fillStyle="#111126";
      const hiW=ctx.measureText("High").width;ctx.fillText("High",82,104);
      ctx.font="300 32px Inter,Arial,sans-serif";ctx.fillStyle="#7b72e9";ctx.fillText("Enough",82+hiW+2,104);
      // Badge top-right
      ctx.fillStyle=t.color+"14";ctx.strokeStyle=t.color+"40";ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(W-220,74,142,32,7);ctx.fill();ctx.stroke();
      ctx.textAlign="center";ctx.font="600 12px Inter,Arial,sans-serif";ctx.fillStyle=t.color;
      ctx.fillText("⭐ Personal Score Card",W-149,95);
      // Divider
      ctx.strokeStyle="#e8e8f2";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(82,122);ctx.lineTo(W-82,122);ctx.stroke();

      // ── Avatar with decorative outer ring ──
      const aX=W/2,aY=248,aR=88;
      // Outer decorative dashed ring
      ctx.save();ctx.setLineDash([8,6]);ctx.strokeStyle=t.color+"35";ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(aX,aY,aR+22,0,Math.PI*2);ctx.stroke();
      ctx.restore();
      // Soft glow behind avatar
      const aGlow=ctx.createRadialGradient(aX,aY,aR-20,aX,aY,aR+40);
      aGlow.addColorStop(0,t.color+"28");aGlow.addColorStop(1,"transparent");
      ctx.fillStyle=aGlow;ctx.beginPath();ctx.arc(aX,aY,aR+40,0,Math.PI*2);ctx.fill();
      // Avatar circle
      ctx.beginPath();ctx.arc(aX,aY,aR,0,Math.PI*2);ctx.fillStyle=profile.color+"20";ctx.fill();
      ctx.strokeStyle=profile.color+"80";ctx.lineWidth=3.5;ctx.stroke();
      ctx.font=`bold ${aR*.82}px Inter,Arial`;ctx.fillStyle=profile.color;ctx.textAlign="center";
      ctx.fillText(ini(profile.name),aX,aY+aR*.3);

      // ── Name + handle ──
      ctx.textAlign="center";ctx.font="800 48px Inter,Arial,sans-serif";ctx.fillStyle="#111126";ctx.fillText(profile.name,W/2,402);
      ctx.font="500 20px 'JetBrains Mono',monospace";ctx.fillStyle="#9090b4";ctx.fillText(profile.handle||"",W/2,432);

      // ── Score section with circular arc ──
      const cX=W/2,cY=570,cR=100;
      // Background arc track
      ctx.save();ctx.strokeStyle="#ebebf4";ctx.lineWidth=14;ctx.lineCap="round";
      ctx.beginPath();ctx.arc(cX,cY,cR,Math.PI*.75,Math.PI*2.25);ctx.stroke();
      // Score fill arc
      const pctArc=Math.min((sc??0)/1000,1);
      const arcGrad=ctx.createLinearGradient(cX-cR,cY,cX+cR,cY);
      arcGrad.addColorStop(0,t.grad[0]);arcGrad.addColorStop(1,t.grad[1]);
      ctx.strokeStyle=arcGrad;ctx.lineWidth=14;ctx.lineCap="round";
      ctx.beginPath();ctx.arc(cX,cY,cR,Math.PI*.75,Math.PI*.75+Math.PI*1.5*pctArc);ctx.stroke();
      ctx.restore();
      // Score number inside arc
      ctx.textAlign="center";ctx.font="900 86px 'JetBrains Mono',monospace";
      const numGrad=ctx.createLinearGradient(cX-90,cY-60,cX+90,cY+10);
      numGrad.addColorStop(0,t.grad[0]);numGrad.addColorStop(1,t.grad[1]);
      ctx.fillStyle=numGrad;ctx.fillText(sc!=null?fmtScore(sc):"—",cX,cY+28);
      ctx.font="600 16px Inter,Arial,sans-serif";ctx.fillStyle="#9090b0";ctx.fillText("OVERALL SCORE",cX,cY+58);

      // ── Tier badge ──
      const tierLabel=`${t.emoji}  ${t.label.toUpperCase()}`;
      ctx.font="700 22px Inter,Arial,sans-serif";ctx.textAlign="center";

      ctx.fillText(`Rated by ${rCount} ${rCount===1?"person":"people"}  ·  ${n} total rating${n!==1?"s":""}`,W/2,798);

      // ── Category cards (taller boxes with score %) ──
      const cGap=12,cW=(W-164-(cats.length-1)*cGap)/cats.length,cBY=840,cBH=110,cStartX=82;
      cats.forEach((c,i)=>{
        const v=cAvg(profile,c.id),x=cStartX+i*(cW+cGap);
        // Card bg
        ctx.fillStyle="#f8f8fd";ctx.strokeStyle="#e8e8f2";ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(x,cBY,cW,cBH,10);ctx.fill();ctx.stroke();

        const catGrad=ctx.createLinearGradient(x,cBY,x+cW,cBY);catGrad.addColorStop(0,profile.color+"cc");catGrad.addColorStop(1,t.color+"99");
        ctx.fillStyle=catGrad;ctx.beginPath();ctx.roundRect(x,cBY,cW,5,{upperLeft:10,upperRight:10,lowerLeft:0,lowerRight:0});ctx.fill();
        // Emoji

        }
      });

      // ── UID section ──

      ctx.font="800 28px Inter,Arial,sans-serif";ctx.textAlign="center";ctx.fillStyle="#111126";
      const hiF=ctx.measureText("High").width;const lsx=W/2-(hiF+(()=>{ctx.font="300 28px Inter,Arial,sans-serif";return ctx.measureText("Enough").width;})()+4)/2;
      ctx.textAlign="left";ctx.font="800 28px Inter,Arial,sans-serif";ctx.fillStyle="#111126";ctx.fillText("High",lsx,1112);

      ctx.font="500 11px 'JetBrains Mono',monospace";ctx.fillStyle=t.color+"99";ctx.fillText(profileUrl,W/2,1164);
    }
  },[profile]);

  function download(){const canvas=canvasRef.current;if(!canvas)return;const a=document.createElement("a");a.download=`${profile.name.replace(/\s+/g,"_")}_HighEnough.png`;a.href=canvas.toDataURL("image/png");a.click();setSaved(true);setTimeout(()=>setSaved(false),2000);}

/* ══════════════════════════════════════
   MAIN APP

const DP={dark:true};

function App(){
  const [authUser,setAuthUser]=useState(null);
  const [authError,setAuthError]=useState(""); // shown on AuthScreen (e.g. deleted account)
  const [profile,setProfile]=useState(null);
  const [profileFetched,setProfileFetched]=useState(false); // true once we've tried to load profile from DB
  const [authLoading,setAuthLoading]=useState(true);
  const [profiles,setProfiles]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [blocked,setBlocked]=useState([]);
  const [following,setFollowing]=useState([]);
  const [reports,setReports]=useState([]);
  const [convs,setConvs]=useState([]);
  const [groups,setGroups]=useState([]);
  const [activeGroup,setActiveGroup]=useState(null);
  const [prefs,setPrefs]=useState(DP);
  const [tab,setTab]=useState("feed");
  const [activeChat,setActiveChat]=useState(null);
  const [deepLinkProfile,setDeepLinkProfile]=useState(null); // public profile landing

  // ── Android back button handler ──
  useEffect(()=>{
    // Push initial state
    window.history.pushState({he:"app"},"");
    function onPop(){
      // If chat is open, close it
      if(activeChat){setActiveChat(null);window.history.pushState({he:"app"},"");return;}
      // If modal is open, close it
      if(viewT){setViewT(null);window.history.pushState({he:"app"},"");return;}
      if(rateT){setRateT(null);window.history.pushState({he:"app"},"");return;}
      if(settings){setSettings(false);window.history.pushState({he:"app"},"");return;}
      if(showNotifs){setShowNotifs(false);window.history.pushState({he:"app"},"");return;}
      // If not on feed, go to feed
      if(tab!=="feed"){setTab("feed");window.history.pushState({he:"app"},"");return;}
      // Otherwise let browser handle (will show "Leave site?" on Android)
    }
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[activeChat,viewT,rateT,settings,showNotifs,tab]);
  const [rateT,setRateT]=useState(null);
  const [viewT,setViewT]=useState(null);
  const [qrT,setQRT]=useState(null);
  const [settings,setSettings]=useState(false);
  const [photo,setPhoto]=useState(false);
  const [scoreCard,setScoreCard]=useState(null);
  const [reportT,setReportT]=useState(null);
  const [showBlocked,setShowBlocked]=useState(false);
  const [showNotifs,setShowNotifs]=useState(false);
  const [showAdminLock,setShowAdminLock]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [adminTaps,setAdminTaps]=useState(0);
  const [toast,setToast]=useState(null);
  const adminTimer=useRef(null);
  const T=prefs.dark?DK:LT;
  const pop=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  // ── Load saved prefs ──
  useEffect(()=>{const p=getPref();if(p.dark!==undefined)setPrefs(prev=>({...prev,...p}));},[]);

  /* ── Auth listener — simple, reliable, no race conditions ── */
  const profileLoadingRef=useRef(false); // prevents double-load across closures
  const profileRef=useRef(null);         // tracks profile state inside auth closure (avoids stale state)
  const pollRef=useRef(null);            // 30-second poll — cleared on logout to prevent memory leak
  const profilesRef=useRef([]);          // live profiles list accessible in event listeners
  // pendingDlRef stores the deep link from URL so it survives through the login flow.
  // Parsed ONCE at startup. After login, loadAppData uses it to auto-open the profile.
  const pendingDlRef=useRef(parseDeepLink());
  useEffect(()=>{profileRef.current=profile;},[profile]);
  useEffect(()=>{profilesRef.current=profiles;},[profiles]);
  useEffect(()=>{

    async function isDeleted(uid){
      try{const {data}=await sb.from("deleted_accounts").select("auth_id").eq("auth_id",uid).maybeSingle();return!!data;}
      catch{return false;}
    }

    async function bootUser(user,deepLink){
      if(profileLoadingRef.current)return;
      profileLoadingRef.current=true;

      // ── Deleted account check ──────────────────────────────────────────────
      // If this auth_id is in deleted_accounts, check whether they have an
      // active profile. If yes → truly deleted, block them. If no profile →
      // they deleted and are trying to start fresh (especially Google OAuth
      // which reuses the same auth_id). Un-block them so they can re-register.
      const deleted=await isDeleted(user.id);
      if(deleted){
        const {data:existingProfile}=await sb.from("profiles").select("id").eq("id",user.id).maybeSingle();
        if(!existingProfile){
          // No profile + deletion record = user wants a fresh start. Clear the block.
          await sb.from("deleted_accounts").delete().eq("auth_id",user.id);
        } else {
          // Profile still exists somehow AND deletion record exists = genuinely deleted
          setAuthError("This account has been permanently deleted.");
          await sb.auth.signOut();
          profileLoadingRef.current=false;
          return;
        }
      }
      // ─────────────────────────────────────────────────────────────────────────
      setAuthError("");
      setAuthUser(user);
      loadProfile(user.id,deepLink);
    }

    const {data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==="INITIAL_SESSION"){
        if(session?.user){
          await bootUser(session.user,pendingDlRef.current);
        } else {
          // ── FIX 1: Cold-start recovery ──────────────────────────────────────────
          // On Supabase free tier, the project may be waking up when INITIAL_SESSION
          // fires. The session comes back null even though the user IS logged in.
          // We call getSession() directly with retries to catch this race condition.
          // Without this, the login screen flashes on every cold start.
          let recovered=false;
          for(let attempt=0;attempt<3;attempt++){
            try{
              await new Promise(r=>setTimeout(r,attempt===0?0:2000)); // 0s, 2s, 4s
              const {data:{session:s2}}=await sb.auth.getSession();
              if(s2?.user){
                recovered=true;
                await bootUser(s2.user,pendingDlRef.current);
                break;
              }
            }catch(e){console.warn("getSession attempt",attempt,"failed:",e);}
          }
          if(!recovered){
            // Confirmed: no session. Show public profile or login screen.
            if(pendingDlRef.current){
              const dl=pendingDlRef.current;
              try{
                let q=sb.from("profiles").select("*");
                if(dl.type==="handle")q=q.ilike("handle",`%${dl.val}%`);
                else if(dl.type==="short_id"||dl.type==="invite")q=q.eq("short_id",dl.val);
                else q=q.eq("id",dl.val);
                const {data}=await q.limit(1).maybeSingle();
                if(data){
                  const {data:rr}=await sb.from("ratings").select("*").eq("target_id",data.id);
                  setDeepLinkProfile({...data,ratings:(rr||[]).map(r=>({raterId:r.rater_id,raterName:r.rater_name||"",vibe:r.vibe,humor:r.humor,kindness:r.kindness,rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,ts:new Date(r.updated_at).getTime()}))});
                }
              }catch(e){console.error("Deep link error:",e);}
            }
            setAuthLoading(false);
          }
        }
      }
      else if(event==="SIGNED_IN"&&session?.user){
        // Handles Google OAuth redirect and email confirmation link clicks.
        // Email/password login is handled by handleAuthed directly (more reliable).
        // ── FIX 2: Always reset profileLoadingRef so SIGNED_IN can proceed ──
        // If a previous boot attempt timed out without resetting the ref, this
        // guard would permanently block re-authentication in the same session.
        // We only skip if profile is ALREADY fully loaded (not just "loading").
        if(profileRef.current){return;} // already loaded, skip
        profileLoadingRef.current=false; // reset so bootUser can proceed
        await bootUser(session.user,pendingDlRef.current);
      }
      else if(event==="TOKEN_REFRESHED"&&session?.user){
        // Session silently refreshed (e.g., app reopened after access token expiry)
        setAuthUser(session.user);
        // Fix: if profile wasn't loaded (app resumed from background), load it now
        if(!profileRef.current&&!profileLoadingRef.current){
          profileLoadingRef.current=true;
          loadProfile(session.user.id,null);
        }
      }
      else if(event==="SIGNED_OUT"){
        // ── FIX 3: Robust unintentional-signout recovery ────────────────────────
        // Supabase fires SIGNED_OUT on token-refresh failure (network error, cold
        // start timeout). On free tier this is common. We retry getSession() up to
        // 3 times with backoff before accepting that the user is truly signed out.
        const wasIntentional=localStorage.getItem("he_intent_signout")==="true";
        localStorage.removeItem("he_intent_signout");
        if(!wasIntentional){
          for(let attempt=0;attempt<3;attempt++){
            try{
              await new Promise(r=>setTimeout(r,attempt===0?500:2000));
              const {data:{session:s2}}=await sb.auth.getSession();
              if(s2?.user){
                // Session recovered — restore user and reload profile if missing
                setAuthUser(s2.user);
                if(!profileRef.current&&!profileLoadingRef.current){
                  profileLoadingRef.current=true;
                  loadProfile(s2.user.id,null);
                }
                return; // do NOT wipe state
              }
            }catch(e){console.warn("SIGNED_OUT recovery attempt",attempt,"failed:",e);}
          }
          // All retries failed AND not intentional — likely a real session expiry,
          // not a network blip. Still don't show login; just refresh the page once
          // so Supabase can re-hydrate from localStorage on a clean load.
          const alreadyRetried=sessionStorage.getItem("he_signout_retry")==="1";
          if(!alreadyRetried){
            sessionStorage.setItem("he_signout_retry","1");
            window.location.reload();
            return;
          }
          sessionStorage.removeItem("he_signout_retry");
        }
        // Clean up poll interval to prevent memory leak and stale updates
        if(pollRef.current){clearInterval(pollRef.current);pollRef.current=null;}
        profileLoadingRef.current=false;
        setAuthUser(null);setProfile(null);setProfileFetched(false);
        setProfiles([]);setNotifs([]);setFollowing([]);setBlocked([]);
        setConvs([]);setDeepLinkProfile(null);setAuthLoading(false);
      }
    });

    return()=>subscription.unsubscribe();
  },[]);

  // ── Deep link handler — works both on fresh load AND when app comes to foreground ──
  // Root cause of QR scan not working: parseDeepLink() only ran once at mount.
  // If the PWA was already open and user scans a QR, the URL changes but mount never
  // re-fires. This visibilitychange listener re-checks the URL every time the app
  // becomes visible — so scanning a QR always opens the right profile.
  useEffect(()=>{
    async function handleDeepLinkUrl(){
      const dl=parseDeepLink();
      if(!dl)return;
      // Don't act on deep link if there's no logged-in user with a loaded profile
      if(!profileRef.current)return;
      try{
        let q=sb.from("profiles").select("*");
        if(dl.type==="handle")q=q.ilike("handle",`%${dl.val}%`);
        else if(dl.type==="short_id"||dl.type==="invite")q=q.eq("short_id",dl.val);
        else q=q.eq("id",dl.val);
        const {data:dlp}=await q.limit(1).maybeSingle();
        if(dlp){
          // Merge ratings from already-loaded profiles state if available
          const existing=profilesRef.current.find(p=>p.id===dlp.id);
          const full=existing||dlp;
          if(!existing){
            // Fetch ratings fresh if not already in state
            const {data:dlr}=await sb.from("ratings").select("*").eq("target_id",dlp.id);
            setViewT({...dlp,ratings:(dlr||[]).map(r=>({raterId:r.rater_id,raterName:r.rater_name||"",vibe:r.vibe,humor:r.humor,kindness:r.kindness,rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,ts:new Date(r.updated_at).getTime()}))});
          } else {
            setViewT(full);
          }
          // Clean the URL so back-navigation doesn't re-trigger the deep link
          window.history.replaceState({},"",window.location.pathname);
        }
      }catch(e){console.error("handleDeepLinkUrl error:",e);}
    }

    // Fire once on mount (handles fresh page load from QR scan)
    handleDeepLinkUrl();

    // Fire every time the app comes back to foreground (handles PWA already open in background)
    function onVisible(){if(document.visibilityState==="visible")handleDeepLinkUrl();}
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[]);

  async function loadProfile(userId,dl=null){
    try{
      let {data,error}=await sb.from("profiles").select("*").eq("id",userId).maybeSingle();

      // ── DB errors (RLS, network) must NOT be treated as "no profile" ──
      if(error){
        console.error("loadProfile error:",error);
        await new Promise(r=>setTimeout(r,1500));
        const res2=await sb.from("profiles").select("*").eq("id",userId).maybeSingle();
        if(res2.error){
          console.error("loadProfile retry failed:",res2.error);
          setAuthError("Could not load your profile. Please log in again.");
          await sb.auth.signOut();
          profileLoadingRef.current=false; // ── FIX 4: always reset
          return;
        }
        data=res2.data;
      }

      if(data){
        const fullProfile={...data,account_type:data.account_type||"personal"};
        setProfile(fullProfile);setProfileFetched(true);
        setGroups(loadGroups(fullProfile.id));
        loadAppData(fullProfile,dl);
      }else{
        // No profile row — check for cross-provider collision before showing setup
        try{
          const {data:{user:cu}}=await sb.auth.getUser();
          if(cu?.email){
            const {data:ep}=await sb.from("profiles").select("id,email,name").eq("email",cu.email).maybeSingle();
            if(ep&&ep.id!==userId){
              setAuthError("This email is linked to a different login method (e.g. Google). Please use that to sign in.");
              await sb.auth.signOut();
              profileLoadingRef.current=false; // ── FIX 4: always reset
              return;
            }
          }
        }catch(e){console.error("email lookup error:",e);}
        // Genuinely new user — show ProfileSetup
        setProfileFetched(true);setAuthLoading(false);
        profileLoadingRef.current=false; // ── FIX 4: always reset
      }
    }catch(e){
      console.error("loadProfile exception:",e);
      setProfileFetched(true);setAuthLoading(false);
      profileLoadingRef.current=false; // ── FIX 4: always reset
    }
  }

  async function loadAppData(myProfile,dl=null){
    const uid=myProfile.id;
    try{
    const [profRes,ratRes,followRes,myFollowersRes,blockRes,notifRes,msgRes,delRes]=await Promise.all([
      sb.from("profiles").select("*"),
      sb.from("ratings").select("*"),
      sb.from("follows").select("following_id").eq("follower_id",uid),
      sb.from("follows").select("follower_id").eq("following_id",uid),
      sb.from("blocks").select("blocked_id").eq("blocker_id",uid),
      sb.from("notifications").select("*").eq("target_id",uid).order("created_at",{ascending:false}).limit(60),
      sb.from("messages").select("*").or(`sender_id.eq.${uid},receiver_id.eq.${uid}`).order("created_at",{ascending:true}),
      sb.from("deleted_accounts").select("auth_id"),
    ]);
    // Build a set of deleted auth IDs so we can filter orphaned profile rows
    const deletedIds=new Set((delRes.data||[]).map(d=>d.auth_id));
    const allRatings=ratRes.data||[];
    // Compute real follower/following counts from follows table
    const followingIds=(followRes.data||[]).map(r=>r.following_id);
    const followerIds=(myFollowersRes.data||[]).map(r=>r.follower_id);
    if(profRes.data){
      const merged=profRes.data
        .filter(p=>!deletedIds.has(p.id))
        .map(p=>({...p,account_type:p.account_type||"personal",ratings:allRatings.filter(r=>r.target_id===p.id).map(r=>({raterId:r.rater_id,raterName:r.rater_name||"",vibe:r.vibe,humor:r.humor,kindness:r.kindness,rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,ts:new Date(r.updated_at).getTime()}))}));
      setProfiles(merged);
    }
    // Update own profile with real counts
    setProfile(prev=>({...prev,followers_count:followerIds.length,following_count:followingIds.length}));
    setFollowing(followingIds);
    setBlocked((blockRes.data||[]).map(r=>r.blocked_id));
    if(notifRes.data)setNotifs(notifRes.data.map(n=>({type:n.type,actorId:n.actor_id,text:n.text,ts:new Date(n.created_at).getTime(),read:n.read})));

    // Build conversations
    if(msgRes.data){
      const msgsByConv={};
      msgRes.data.forEach(m=>{
        const otherId=m.sender_id===uid?m.receiver_id:m.sender_id;
        const cid=[uid,otherId].sort().join("_");
        if(!msgsByConv[cid])msgsByConv[cid]={id:cid,oid:otherId,messages:[]};
        msgsByConv[cid].messages.push({sid:m.sender_id,txt:m.text,ts:new Date(m.created_at).getTime(),read:m.read,status:m.status||"delivered",dbId:m.id});
      });
      setConvs(Object.values(msgsByConv));
    }

    // ── Real-time: ratings (unique channel per user) ──
    sb.channel(`rt_ratings_${uid}`).on("postgres_changes",{event:"*",schema:"public",table:"ratings"},async()=>{
      const {data:nr}=await sb.from("ratings").select("*");
      if(nr)setProfiles(prev=>prev.map(p=>({...p,ratings:nr.filter(r=>r.target_id===p.id).map(r=>({raterId:r.rater_id,raterName:r.rater_name||"",vibe:r.vibe,humor:r.humor,kindness:r.kindness,rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,ts:new Date(r.updated_at).getTime()}))})));
    }).subscribe();

    // ── Real-time: notifications ──
    sb.channel(`rt_notifs_${uid}`).on("postgres_changes",{event:"INSERT",schema:"public",table:"notifications",filter:`target_id=eq.${uid}`},payload=>{
      const n=payload.new;
      setNotifs(prev=>[{type:n.type,actorId:n.actor_id,text:n.text,ts:new Date(n.created_at).getTime(),read:false},...prev].slice(0,60));
    }).subscribe();

    // ── Real-time: messages ──
    sb.channel(`rt_msgs_${uid}`).on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},payload=>{
      const m=payload.new;
      if(m.sender_id!==uid&&m.receiver_id!==uid)return;
      const otherId=m.sender_id===uid?m.receiver_id:m.sender_id;
      const cid=[uid,otherId].sort().join("_");
      const newMsg={sid:m.sender_id,txt:m.text,ts:new Date(m.created_at).getTime(),read:m.read,status:m.status||"delivered",dbId:m.id};
      setConvs(prev=>{const ex=prev.find(c=>c.id===cid);if(ex)return prev.map(c=>c.id===cid?{...c,messages:[...c.messages.filter(x=>x.dbId!==newMsg.dbId),newMsg]}:c);return[...prev,{id:cid,oid:otherId,messages:[newMsg]}];});
      setActiveChat(prev=>prev&&prev.id===cid?{...prev,messages:[...prev.messages.filter(x=>x.dbId!==newMsg.dbId),newMsg]}:prev);
    }).subscribe();

    // ── Real-time: message updates (seen status) ──
    sb.channel(`rt_msg_upd_${uid}`).on("postgres_changes",{event:"UPDATE",schema:"public",table:"messages"},payload=>{
      const m=payload.new;
      const otherId=m.sender_id===uid?m.receiver_id:m.sender_id;
      const cid=[uid,otherId].sort().join("_");
      setConvs(prev=>prev.map(c=>c.id===cid?{...c,messages:c.messages.map(x=>x.dbId===m.id?{...x,read:m.read,status:m.status||x.status}:x)}:c));
      setActiveChat(prev=>prev&&prev.id===cid?{...prev,messages:prev.messages.map(x=>x.dbId===m.id?{...x,read:m.read,status:m.status||x.status}:x)}:prev);
    }).subscribe();

    // ── Real-time: follows ──
    sb.channel(`rt_follows_${uid}`).on("postgres_changes",{event:"*",schema:"public",table:"follows"},async()=>{
      const [{data:fol},{data:fwd}]=await Promise.all([
        sb.from("follows").select("following_id").eq("follower_id",uid),
        sb.from("follows").select("follower_id").eq("following_id",uid),
      ]);
      if(fol)setFollowing(fol.map(r=>r.following_id));
      if(fwd)setProfile(prev=>({...prev,followers_count:fwd.length,following_count:(fol||[]).length}));
    }).subscribe();

    setAuthLoading(false);

    // ── Auto-open deep-linked profile (for logged-in users scanning a QR or opening a share link) ──
    // Primary: dl param passed from INITIAL_SESSION / SIGNED_IN / handleAuthed
    // Fallback: sessionStorage — covers the case where user scanned QR → saw PublicProfilePage
    //           → clicked "Log in" → logged in → app loaded fresh (dl would be null by now)
    const effectiveDl = dl || (()=>{
      try{
        const p=JSON.parse(sessionStorage.getItem("he_pending_profile")||"null");
        if(p?.short_id)return{type:"short_id",val:p.short_id};
        if(p?.handle)return{type:"handle",val:(p.handle||"").replace(/^@/,"")};
      }catch{}
      return null;
    })();

    if(effectiveDl){
      pendingDlRef.current=null; // consumed
      try{sessionStorage.removeItem("he_pending_profile");}catch{}
      try{
        let dq=sb.from("profiles").select("*");
        if(effectiveDl.type==="handle")dq=dq.ilike("handle",`%${effectiveDl.val}%`);
        else if(effectiveDl.type==="short_id"||effectiveDl.type==="invite")dq=dq.eq("short_id",effectiveDl.val);
        else dq=dq.eq("id",effectiveDl.val);
        const {data:dlp}=await dq.limit(1).maybeSingle();
        if(dlp&&dlp.id!==myProfile.id){
          const {data:dlr}=await sb.from("ratings").select("*").eq("target_id",dlp.id);
          setViewT({...dlp,ratings:(dlr||[]).map(r=>({raterId:r.rater_id,raterName:r.rater_name||"",vibe:r.vibe,humor:r.humor,kindness:r.kindness,rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,ts:new Date(r.updated_at).getTime()}))});
          window.history.replaceState({},"",window.location.pathname);
        }
      }catch(e){console.error("Deep link open error:",e);}
    }

    }catch(e){console.error("loadAppData error:",e);}
    finally{setAuthLoading(false);profileLoadingRef.current=false;}

    // Poll every 30s — stored in pollRef so SIGNED_OUT can clear it (prevents memory leak)
    if(pollRef.current)clearInterval(pollRef.current);
    pollRef.current=setInterval(async()=>{
      const [pr,rr,dr]=await Promise.all([
        sb.from("profiles").select("*"),
        sb.from("ratings").select("*"),
        sb.from("deleted_accounts").select("auth_id"),
      ]);
      if(pr.data&&rr.data){
        const delSet=new Set((dr.data||[]).map(d=>d.auth_id));
        setProfiles(pr.data.filter(p=>!delSet.has(p.id)).map(p=>({...p,ratings:rr.data.filter(r=>r.target_id===p.id).map(r=>({raterId:r.rater_id,raterName:r.rater_name||"",vibe:r.vibe,humor:r.humor,kindness:r.kindness,rizz:r.rizz,loyalty:r.loyalty,drip:r.drip,ts:new Date(r.updated_at).getTime()}))})));
      }
    },30000);
  }

  async function handleDeleteAccount(){

  async function handleSavePhoto(photoData){
    if(!photoData){await handleSaveProfile({photo:null});setPhoto(false);pop("Photo removed");return;}
    // Compress photo before saving
    try{
      const compressed=await new Promise((res,rej)=>{
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement("canvas");
          const MAX=400;
          let w=img.width,h=img.height;
          if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
          canvas.width=w;canvas.height=h;
          canvas.getContext("2d").drawImage(img,0,0,w,h);
          res(canvas.toDataURL("image/jpeg",0.72));
        };
        img.onerror=rej;
        img.src=photoData;
      });
      await handleSaveProfile({photo:compressed});
    }catch{await handleSaveProfile({photo:photoData});}
    setPhoto(false);pop("Photo updated");
  }

  async function handleSubmit(tid,sc2){

    try{
      const {error}=await sb.from("ratings").upsert(
        {rater_id:sc2.raterId,target_id:tid,rater_name:profile.name,
         vibe:sc2.vibe,humor:sc2.humor,kindness:sc2.kindness,
         rizz:sc2.rizz,loyalty:sc2.loyalty,drip:sc2.drip,
         updated_at:new Date().toISOString()},
        {onConflict:"rater_id,target_id"}
      );
      if(error){console.error("Rating save error:",error);pop("Failed to save. Try again.");return;}
      const ts=Date.now();
      const newR={raterId:sc2.raterId,raterName:profile.name,vibe:sc2.vibe,humor:sc2.humor,
                  kindness:sc2.kindness,rizz:sc2.rizz,loyalty:sc2.loyalty,drip:sc2.drip,ts};
      setProfiles(prev=>prev.map(p=>{
        if(p.id!==tid)return p;
        const ex=p.ratings?.find(r=>r.raterId===sc2.raterId);
        return{...p,ratings:ex?p.ratings.map(r=>r.raterId===sc2.raterId?newR:r):[...(p.ratings||[]),newR]};
      }));
      // Also update viewT if that profile modal is currently open
      setViewT(prev=>{
        if(!prev||prev.id!==tid)return prev;
        const ex=prev.ratings?.find(r=>r.raterId===sc2.raterId);
        return{...prev,ratings:ex?prev.ratings.map(r=>r.raterId===sc2.raterId?newR:r):[...(prev.ratings||[]),newR]};
      });
      const cats=getCats(rateT?.profile||{});
      const scoreGiven=Math.round(cats.reduce((s,c)=>s+(sc2[c.id]||0),0)/cats.length);
      await sb.from("notifications").insert({
        target_id:tid,actor_id:profile.id,actor_name:profile.name,
        type:isEdit?"edit":"rating",text:isEdit?"updated their rating of you":"rated you",
        score:scoreGiven,read:false,created_at:new Date().toISOString()
      });
      setRateT(null);
      pop(isEdit?"Rating updated ✓":"Rating submitted ✓");
    }catch(e){
      console.error("handleSubmit error:",e);
      pop("Something went wrong. Try again.");
    }
  }

  async function handleFollow(uid){
    if(following.includes(uid))return;
    setFollowing(prev=>[...prev,uid]);
    // Update local counts immediately
    setProfiles(prev=>prev.map(p=>p.id===uid?{...p,followers_count:(p.followers_count||0)+1}:p));
    setProfile(prev=>({...prev,following_count:(prev.following_count||0)+1}));
    // Save to DB
    await sb.from("follows").upsert({follower_id:profile.id,following_id:uid});
    // Update follower/following counts in DB
    const targetCount=(profiles.find(p=>p.id===uid)?.followers_count||0)+1;
    const myCount=(profile.following_count||0)+1;
    await Promise.all([
      sb.from("profiles").update({followers_count:targetCount}).eq("id",uid),
      sb.from("profiles").update({following_count:myCount}).eq("id",profile.id),
    ]);
    await sb.from("notifications").insert({target_id:uid,actor_id:profile.id,actor_name:profile.name,type:"follow",text:"started following you",read:false,created_at:new Date().toISOString()});
  }

  async function handleUnfollow(uid){
    setFollowing(prev=>prev.filter(x=>x!==uid));
    setProfiles(prev=>prev.map(p=>p.id===uid?{...p,followers_count:Math.max(0,(p.followers_count||0)-1)}:p));
    setProfile(prev=>({...prev,following_count:Math.max(0,(prev.following_count||0)-1)}));
    await sb.from("follows").delete().eq("follower_id",profile.id).eq("following_id",uid);
    const targetCount=Math.max(0,(profiles.find(p=>p.id===uid)?.followers_count||1)-1);
    const myCount=Math.max(0,(profile.following_count||1)-1);
    await Promise.all([
      sb.from("profiles").update({followers_count:targetCount}).eq("id",uid),
      sb.from("profiles").update({following_count:myCount}).eq("id",profile.id),
    ]);
  }

  async function handleSend(cid,txt){
    const otherId=cid.split("_").find(x=>x!==profile.id);
    const tempId=`temp_${Date.now()}`;
    const msg={sid:profile.id,txt,ts:Date.now(),read:false,status:"sent",dbId:tempId};
    setActiveChat(prev=>({...prev,messages:[...(prev.messages||[]),msg]}));
    setConvs(prev=>{const ex=prev.find(c=>c.id===cid);if(ex)return prev.map(c=>c.id===cid?{...c,messages:[...c.messages,msg]}:c);return[...prev,{id:cid,oid:otherId,messages:[msg]}];});
    const {data}=await sb.from("messages").insert({sender_id:profile.id,receiver_id:otherId,text:txt,read:false,status:"sent",created_at:new Date().toISOString()}).select().single();
    if(data){
      // Update temp message with real dbId and status=delivered
      const realMsg={...msg,dbId:data.id,status:"delivered"};
      setActiveChat(prev=>({...prev,messages:(prev.messages||[]).map(m=>m.dbId===tempId?realMsg:m)}));
      setConvs(prev=>prev.map(c=>c.id===cid?{...c,messages:c.messages.map(m=>m.dbId===tempId?realMsg:m)}:c));
    }
  }

  async function handleMarkRead(cid,otherId){
    if(!otherId||!cid)return;
    // Mark incoming messages as read in DB
    await sb.from("messages").update({read:true,status:"seen"}).eq("sender_id",otherId).eq("receiver_id",profile.id).eq("read",false);
    // Update local state
    setConvs(prev=>prev.map(c=>c.id===cid?{...c,messages:c.messages.map(m=>m.sid!==profile.id&&!m.read?{...m,read:true,status:"seen"}:m)}:c));
  }

  async function handleReport(targetId,reasonId,alsoBlock){
    setReports(prev=>[{targetId,reasonId,ts:Date.now(),reporterId:profile.id},...prev]);
    await sb.from("reports").insert({reporter_id:profile.id,target_id:targetId,reason:reasonId,created_at:new Date().toISOString()});
    if(alsoBlock)handleBlock(targetId);
  }
  async function handleMarkNotif(idx){
    if(idx==="all"){
      setNotifs(prev=>prev.map(n=>({...n,read:true})));
      await sb.from("notifications").update({read:true}).eq("target_id",profile.id).eq("read",false);
    } else {
      setNotifs(prev=>prev.map((n,i)=>i===idx?{...n,read:true}:n));
    }
  }
  async function handleAdminDeleteProfile(id){
    const target=profiles.find(p=>p.id===id);
    try{
      // Blacklist so they can never log back in
      await sb.from("deleted_accounts").insert({auth_id:id,email:target?.email||"",deleted_at:new Date().toISOString()});
      await Promise.all([
        sb.from("ratings").delete().eq("rater_id",id),
        sb.from("ratings").delete().eq("target_id",id),
        sb.from("follows").delete().eq("follower_id",id),
        sb.from("follows").delete().eq("following_id",id),
        sb.from("messages").delete().eq("sender_id",id),
        sb.from("messages").delete().eq("receiver_id",id),
        sb.from("notifications").delete().eq("target_id",id),
        sb.from("notifications").delete().eq("actor_id",id),
        sb.from("blocks").delete().eq("blocker_id",id),
        sb.from("blocks").delete().eq("blocked_id",id),
      ]);
      await sb.from("profiles").delete().eq("id",id);
    }catch(e){console.error("Admin delete error:",e);}
    setProfiles(prev=>prev.filter(p=>p.id!==id));
    pop("Account permanently deleted ✓");
  }
  async function handleAdminClearRatings(id){await sb.from("ratings").delete().eq("target_id",id);setProfiles(prev=>prev.map(p=>p.id===id?{...p,ratings:[]}:p));pop("Ratings cleared");}
  function handleExport(type){const data=type==="all"?{profiles,reports}:type==="profiles"?{profiles}:{reports};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`highenough_${type}_${Date.now()}.json`;a.click();pop("Exported ✓");}

  async function handleClearChat(cid){
    const otherId=cid.split("_").find(x=>x!==profile.id);
    await sb.from("messages").delete().or(`and(sender_id.eq.${profile.id},receiver_id.eq.${otherId}),and(sender_id.eq.${otherId},receiver_id.eq.${profile.id})`);
    setConvs(prev=>prev.map(c=>c.id===cid?{...c,messages:[]}:c));
    setActiveChat(null);pop("Chat cleared");
  }
  async function handleDeleteConv(cid){await handleClearChat(cid);setConvs(prev=>prev.filter(c=>c.id!==cid));pop("Conversation deleted");}

  const [canInstall,setCanInstall]=useState(false);
  useEffect(()=>{
    const onReady=()=>setCanInstall(true);
    const onInstalled=()=>setCanInstall(false);
    window.addEventListener('he-install-ready',onReady);
    window.addEventListener('he-installed',onInstalled);
    return()=>{window.removeEventListener('he-install-ready',onReady);window.removeEventListener('he-installed',onInstalled);};
  },[]);
  async function handleInstall(){if(window.hePromptInstall)await window.hePromptInstall();setCanInstall(false);}

  useEffect(()=>{document.body.style.background=T.bg;document.body.style.color=T.txt;},[T.bg,T.txt]);

  // Dismiss splash once auth resolved
  useEffect(()=>{
    if(!authLoading){
      const s=document.getElementById('splash');
      if(s){s.style.transition='opacity .2s';s.style.opacity='0';setTimeout(()=>s.remove(),200);}
    }
  },[authLoading]);

  // Safety fallback — if auth hasn't resolved after 20s, check session
  // one final time before showing login screen. This prevents the fallback
  // from force-showing login when the user IS logged in but the server
  // is still slow to respond (free tier cold start).
  // If localStorage already has a session token, wait even longer (35s)
  // before giving up — the user is almost certainly logged in.
  useEffect(()=>{
    const wait=HE_HAS_SESSION?35000:20000;
    const t=setTimeout(async()=>{
      if(!authLoading)return;
      try{
        const {data:{session}}=await sb.auth.getSession();
        if(session?.user){
          setTimeout(()=>{
            setAuthLoading(false);setProfileFetched(true);
            const s=document.getElementById('splash');
            if(s){s.style.opacity='0';setTimeout(()=>s.remove(),200);}
          },15000);
          return;
        }
      }catch(e){}
      setAuthLoading(false);setProfileFetched(true);
      const s=document.getElementById('splash');
      if(s){s.style.opacity='0';setTimeout(()=>s.remove(),200);}
    },wait);
    return()=>clearTimeout(t);
  },[]);

  // While auth is resolving — splash is already showing, render nothing underneath
  if(authLoading)return null;

  // Extra guard: if authLoading just cleared but authUser hasn't been set yet
  // (race between setAuthLoading(false) and setAuthUser), show spinner briefly
  // rather than flashing the login screen.
  if(!authUser&&!profileFetched){
    return<div style={{minHeight:"100vh",background:"#09090f",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:20,height:20,border:"2px solid #1c1c2c",borderTopColor:"#7b72e9",borderRadius:"50%",animation:"spin .55s linear infinite"}}/>
    </div>;
  }

  if(!authUser){
    if(deepLinkProfile)return<PublicProfilePage profile={deepLinkProfile} onJoin={()=>setDeepLinkProfile(null)}/>;
    return<AuthScreen T={DK} onAuthed={handleAuthed} authError={authError} onClearAuthError={()=>setAuthError("")}/>;
  }
  // Only show ProfileSetup if we've confirmed the user has NO profile in DB
  if(!profile&&!profileFetched)return<div style={{minHeight:"100vh",background:"#09090f",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:20,height:20,border:"2px solid #1c1c2c",borderTopColor:"#7b72e9",borderRadius:"50%",animation:"spin .55s linear infinite"}}/></div>;
  if(!profile&&profileFetched)return<ProfileSetup user={authUser} T={T} onDone={handleProfileCreated}/>;

  // Active chat = full screen
  if(activeGroup)return<GroupChatScreen group={activeGroup} myProfile={profile} profiles={profiles} T={T} onBack={()=>setActiveGroup(null)} onSendGroup={handleSendGroup} onUpdateGroup={handleUpdateGroup} onDeleteGroup={handleDeleteGroup} onViewProfile={p=>setViewT(p)}/>;
  if(activeChat)return<ChatScreen conv={activeChat} myProfile={profile} T={T} onBack={()=>setActiveChat(null)} onSend={handleSend} onMarkRead={handleMarkRead} onClearChat={handleClearChat} onBlockUser={(uid)=>{handleBlock(uid);}} onReportUser={(p)=>setReportT(p)} onViewProfile={p=>{setActiveChat(null);setViewT(p);}}/>;

  const myP=profiles.find(p=>p.id===profile.id)||{...profile,ratings:[]};
  const allFeedProfiles=profiles.filter(p=>p.id!==profile.id&&!blocked.includes(p.id));
  const followedFeed=allFeedProfiles.filter(p=>following.includes(p.id));
  const followedPersonal=followedFeed.filter(p=>(p.account_type||"personal")==="personal");
  const followedBiz=followedFeed.filter(p=>p.account_type==="business");
  const suggestedPersonal=allFeedProfiles.filter(p=>!following.includes(p.id)&&(p.account_type||"personal")==="personal").slice(0,6);
  const suggestedBiz=allFeedProfiles.filter(p=>!following.includes(p.id)&&p.account_type==="business").slice(0,4);
  const unreadN=notifs.filter(n=>!n.read).length;
  const unreadM=convs.reduce((s,c)=>s+(c.messages?.filter(m=>m.sid!==profile.id&&!m.read).length||0),0);

  const NAV=[
    {id:"feed",    label:"Home",    Icon:HomeIcon},
    {id:"search",  label:"Search",  Icon:SearchIcon},
    {id:"board",   label:"Board",   Icon:BoardIcon},
    {id:"inbox",   label:"Inbox",   Icon:MsgIcon2,  badge:unreadM},
    {id:"profile", label:"Profile", Icon:UserIcon},
  ];

  return<>
    <div style={{minHeight:"100vh",background:T.bg,color:T.txt,paddingBottom:68}}>
      {/* HEADER */}
      <div style={{background:`${T.nav}e8`,borderBottom:`1px solid ${T.b1}`,padding:"14px 18px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)"}}>
        <div style={{fontWeight:900,fontSize:24,letterSpacing:"-2px",color:T.txt,cursor:"pointer",userSelect:"none",lineHeight:1}} onClick={handleAdminTap}>
          High<span style={{color:AC,fontWeight:300,letterSpacing:"0.04em"}}>Enough</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {canInstall&&<button onClick={handleInstall} style={{padding:"7px 14px",background:`linear-gradient(135deg,${AC}cc,${AC}80)`,border:"none",borderRadius:20,color:"#fff",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:5,boxShadow:`0 4px 14px ${AC}40`}}>📲 Install</button>}
          <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setShowNotifs(true)}>
            <div style={{width:38,height:38,borderRadius:12,background:T.faint,border:`1px solid ${T.b1}`,display:"flex",alignItems:"center",justifyContent:"center",color:T.mu,transition:"all .15s"}}><BellIcon/></div>
            {unreadN>0&&<div style={{position:"absolute",top:-3,right:-3,minWidth:16,height:16,borderRadius:99,background:"#e0304a",border:`2px solid ${T.nav}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:800,padding:"0 3px"}}>{unreadN>9?"9+":unreadN}</div>}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      {tab==="feed"&&<div style={{padding:"14px 14px 0"}}>
        {followedFeed.length===0?<div>
          <div style={{textAlign:"center",padding:"28px 20px 16px",color:T.mu}}>
            <div style={{fontSize:36,marginBottom:10,opacity:.4}}>◎</div>
            <div style={{fontWeight:700,fontSize:16,color:T.txt,marginBottom:6}}>Your feed is empty</div>
            <div style={{fontSize:13,opacity:.7,lineHeight:1.5}}>Follow people & businesses to see them here.</div>
          </div>
          {suggestedPersonal.length>0&&<><div style={{fontWeight:700,fontSize:14,color:T.txt,padding:"8px 0 10px",letterSpacing:"-.2px"}}>👤 Suggested People</div><div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>{suggestedPersonal.map((p,i)=><FeedCard key={p.id} p={p} myId={profile.id} following={following} T={T} onView={setViewT} onFollow={handleFollow} onUnfollow={handleUnfollow} onRate={handleRate} onMsg={handleMsg} idx={i}/>)}</div></>}
          {suggestedBiz.length>0&&<><div style={{fontWeight:700,fontSize:14,color:T.txt,padding:"8px 0 10px",letterSpacing:"-.2px"}}>🏢 Businesses to Review</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{suggestedBiz.map((p,i)=><FeedCard key={p.id} p={p} myId={profile.id} following={following} T={T} onView={setViewT} onFollow={handleFollow} onUnfollow={handleUnfollow} onRate={handleRate} onMsg={handleMsg} idx={i}/>)}</div></>}
        </div>:<div>
          {followedPersonal.length>0&&<><div style={{fontWeight:700,fontSize:13,color:T.mu,padding:"4px 0 10px",letterSpacing:".04em",textTransform:"uppercase"}}>👤 People</div><div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:18}}>{followedPersonal.map((p,i)=><FeedCard key={p.id} p={p} myId={profile.id} following={following} T={T} onView={setViewT} onFollow={handleFollow} onUnfollow={handleUnfollow} onRate={handleRate} onMsg={handleMsg} idx={i}/>)}</div></>}
          {followedBiz.length>0&&<><div style={{fontWeight:700,fontSize:13,color:T.mu,padding:"4px 0 10px",letterSpacing:".04em",textTransform:"uppercase"}}>🏢 Businesses</div><div style={{display:"flex",flexDirection:"column",gap:12}}>{followedBiz.map((p,i)=><FeedCard key={p.id} p={p} myId={profile.id} following={following} T={T} onView={setViewT} onFollow={handleFollow} onUnfollow={handleUnfollow} onRate={handleRate} onMsg={handleMsg} idx={i}/>)}</div></>}
          {suggestedPersonal.length>0&&<><div style={{fontWeight:700,fontSize:13,color:T.mu,padding:"18px 0 10px",letterSpacing:".04em",textTransform:"uppercase"}}>✨ Suggested</div><div style={{display:"flex",flexDirection:"column",gap:10}}>{suggestedPersonal.slice(0,3).map((p,i)=><FeedCard key={p.id} p={p} myId={profile.id} following={following} T={T} onView={setViewT} onFollow={handleFollow} onUnfollow={handleUnfollow} onRate={handleRate} onMsg={handleMsg} idx={i}/>)}</div></>}
        </div>}
      </div>}

      {tab==="search"&&<SearchTab profiles={profiles.filter(p=>p.id!==profile.id)} myId={profile.id} following={following} T={T} onView={setViewT} onFollow={handleFollow} onUnfollow={handleUnfollow} onRate={handleRate} myProfile={profile}/>}

      {tab==="board"&&<BoardTab profiles={profiles} myId={profile.id} T={T} onView={setViewT}/>}

      {tab==="inbox"&&<InboxTab convs={convs.map(c=>{const other=profiles.find(p=>p.id===c.oid);return other?{...c,other}:null;}).filter(Boolean)} profiles={profiles} myProfile={profile} following={following} T={T} onOpen={(conv,other)=>setActiveChat({...conv,other})} onDeleteConv={handleDeleteConv} onViewProfile={p=>setViewT(p)} groups={groups} onOpenGroup={g=>setActiveGroup(g)} onCreateGroup={handleCreateGroup}/>}

      {tab==="profile"&&<ProfileTab myProfile={profile} myP={myP} T={T} onQR={()=>setQRT(myP)} onSettings={()=>setSettings(true)} onEditPhoto={()=>setPhoto(true)} onScoreCard={()=>setScoreCard(myP)} following={following} profiles={profiles} onViewProfile={p=>setViewT(p)}/>}
    </div>

    {/* BOTTOM NAV */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:`${T.nav}f0`,borderTop:`1px solid ${T.b1}`,display:"flex",padding:"10px 8px max(14px,env(safe-area-inset-bottom))",zIndex:100,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)"}}>
      {NAV.map(({id,label,Icon,badge})=>
        <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:tab===id?AC:T.mu,transition:"color .15s",padding:"2px 0"}}>
          <div style={{position:"relative",padding:"6px 14px",borderRadius:14,background:tab===id?`${AC}18`:"transparent",transition:"all .2s",boxShadow:tab===id?`0 2px 12px ${AC}30`:"none"}}>
            <Icon active={tab===id}/>
            {badge>0&&<div style={{position:"absolute",top:-2,right:-2,minWidth:15,height:15,borderRadius:99,background:"#e0304a",border:`2px solid ${T.nav}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:800,padding:"0 3px"}}>{badge>9?"9+":badge}</div>}
          </div>
          <span style={{fontSize:9.5,fontWeight:tab===id?700:400,letterSpacing:".03em"}}>{label}</span>
        </button>)}
    </div>

    {rateT      &&<RateModal target={rateT.profile} raterId={profile.id} existing={rateT.existing} T={T} onClose={()=>setRateT(null)} onSubmit={handleSubmit}/>}
    {viewT      &&<ProfileModal profile={viewT} myId={profile.id} following={following} profiles={profiles} T={T} onClose={()=>setViewT(null)} onRate={handleRate} onFollow={handleFollow} onUnfollow={handleUnfollow} onBlock={handleBlock} onReport={setReportT} onMsg={p=>{setViewT(null);handleMsg(p);}} onViewOther={p=>setViewT(p)}/>}
    {qrT        &&<QRModal profile={qrT} T={T} onClose={()=>setQRT(null)}/>}
    {settings   &&<SettingsModal me={profile} prefs={prefs} T={T} onClose={()=>setSettings(false)} onSave={handleSaveProfile} onSavePrefs={handleSavePrefs} onEditPhoto={()=>{setSettings(false);setPhoto(true);}} onShowBlocked={()=>{setSettings(false);setShowBlocked(true);}} onLogout={handleLogout} onDelete={handleDeleteAccount} onQR={()=>{setSettings(false);setTimeout(()=>setQRT(myP),80);}}/>}
    {photo      &&<PhotoModal profile={profile} T={T} onClose={()=>setPhoto(false)} onSave={handleSavePhoto}/>}
    {scoreCard  &&<ScoreCardModal profile={scoreCard} T={T} onClose={()=>setScoreCard(null)}/>}
    {reportT    &&<ReportModal target={reportT} T={T} onClose={()=>setReportT(null)} onSubmit={handleReport}/>}
    {showBlocked&&<BlockedListPanel blocked={blocked} profiles={profiles} T={T} onClose={()=>setShowBlocked(false)} onUnblock={handleUnblock}/>}
    {showNotifs &&<NotifsPanel notifs={notifs} profiles={profiles} T={T} onClose={()=>setShowNotifs(false)} onMark={handleMarkNotif} onView={p=>{setViewT(p);setShowNotifs(false);}}/>}
    {showAdminLock&&<AdminLock T={T} onClose={()=>setShowAdminLock(false)} onUnlock={()=>{setShowAdminLock(false);setShowAdmin(true);}}/>}
    {showAdmin  &&<AdminPanel profiles={profiles} reports={reports} blocked={blocked} T={T} onClose={()=>setShowAdmin(false)} onDeleteProfile={handleAdminDeleteProfile} onClearRatings={handleAdminClearRatings} onExport={handleExport}/>}
    <Toast msg={toast} T={T}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- PWA: Service Worker + Install Prompt -->
<script>
// Register service worker for offline support
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    // Inline service worker as blob URL
    const swCode=`
      const CACHE='highenough-v1';
      const ASSETS=['/'];
      self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
      self.addEventListener('fetch',e=>{
        if(e.request.method!=='GET')return;
        e.respondWith(caches.match(e.request).then(cached=>{
          const fresh=fetch(e.request).then(res=>{
            if(res.ok){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));}
            return res;
          }).catch(()=>cached);
          return cached||fresh;
        }));
      });
    `;
    const blob=new Blob([swCode],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}

// PWA Install Prompt
let deferredPrompt=null;
window.hePromptInstall=async()=>{if(!deferredPrompt)return false;await deferredPrompt.prompt();deferredPrompt=null;window.dispatchEvent(new Event('he-installed'));return true;};
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  window.dispatchEvent(new Event('he-install-ready'));
  // Show install banner after 3s
  setTimeout(()=>{
    if(!deferredPrompt)return;
    const banner=document.createElement('div');
    banner.id='he-install-banner';
    banner.innerHTML=`
      <div style="position:fixed;bottom:80px;left:12px;right:12px;z-index:9999;background:#111119;border:1px solid #262638;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideUp .3s ease;">
        <div style="width:44px;height:44px;border-radius:10px;background:#09090f;border:1px solid #1c1c2c;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">⬆</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px;color:#dde0f0">Install HighEnough</div>
          <div style="font-size:12px;color:#4e5270;margin-top:2px">Add to Home Screen for the best experience</div>
        </div>
        <button id="he-install-btn" style="padding:8px 16px;background:linear-gradient(135deg,#7b72e9e0,#7b72e990);border:none;border-radius:9px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0">Install</button>
        <button id="he-dismiss-btn" style="background:none;border:none;color:#4e5270;font-size:20px;cursor:pointer;flex-shrink:0;padding:0 4px">✕</button>
      </div>
    `;
    document.body.appendChild(banner);
    document.getElementById('he-install-btn').onclick=async()=>{
      if(deferredPrompt){await deferredPrompt.prompt();deferredPrompt=null;}
      banner.remove();
    };
    document.getElementById('he-dismiss-btn').onclick=()=>banner.remove();
    // Auto-hide after 8s
    setTimeout(()=>{if(document.getElementById('he-install-banner'))banner.remove();},8000);
  },3000);
});
</script>
